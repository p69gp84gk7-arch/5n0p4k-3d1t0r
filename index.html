<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snowpark Designer Pro - CAO V25</title>
    
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/geotiff@2.1.3/dist-browser/geotiff.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* === 1. DESIGN GLOBAL CAO === */
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Arial, sans-serif; background-color: #1e1e1e; color: #d4d4d4; overflow: hidden; }
        .app-container { display: flex; height: 100vh; width: 100vw; }
        
        .sidebar { background-color: #252526; padding: 15px; box-sizing: border-box; overflow-y: auto; z-index: 10; border-right: 1px solid #3e3e42; }
        .sidebar-left { width: 300px; }
        .sidebar-right { width: 350px; border-left: 1px solid #3e3e42; border-right: none; }
        
        h2 { margin-top: 0; font-size: 1.1rem; color: #ffffff; border-bottom: 1px solid #3e3e42; padding-bottom: 10px; font-weight: normal; text-transform: uppercase; letter-spacing: 1px; }
        h3 { margin-top: 0; font-size: 0.85rem; color: #4daaf1; font-weight: normal; margin-bottom: 10px; text-transform: uppercase; }
        
        .panel { background-color: #2d2d30; padding: 15px; margin-bottom: 15px; border: 1px solid #3e3e42; }
        
        .btn { width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #3e3e42; background-color: #3e3e42; color: #ffffff; cursor: pointer; font-size: 0.85rem; text-transform: uppercase; transition: background 0.2s; }
        .btn:hover { background-color: #4f4f53; }
        .btn-primary { background-color: #0e639c; border-color: #0e639c; }
        .btn-primary:hover { background-color: #1177bb; }
        .btn-success { background-color: #27ae60; border-color: #27ae60; margin-bottom: 15px;}
        .btn-danger { background-color: #c74c3c; border-color: #c74c3c; margin-top: 15px; }
        .btn-toggle { background-color: #1e1e1e; border: 1px solid #0e639c; color: #4daaf1; }
        .btn-toggle.active { background-color: #0e639c; color: #ffffff; }
        
        .module-btn { background-color: #333337; border: 1px solid #555; padding: 8px; margin-bottom: 8px; text-align: center; cursor: pointer; font-size: 0.85rem; }
        .module-btn:hover { background-color: #444; }
        .module-btn.active { border-color: #4daaf1; background-color: #1e1e1e; color: #4daaf1; }
        
        .main-workspace { flex-grow: 1; position: relative; display: flex; flex-direction: column; background-color: #1e1e1e; }
        #map-container { flex-grow: 1; position: relative; } 
        #profile-container { height: 320px; background: #252526; border-top: 2px solid #0e639c; padding: 10px; box-sizing: border-box; display: none; position: relative; }
        #close-profile { position: absolute; top: 10px; right: 10px; background: none; border: none; color: #d4d4d4; font-size: 0.9rem; cursor: pointer; font-family: monospace; }
        
        #altitude-box { position: absolute; top: 15px; left: 15px; background-color: rgba(30, 30, 30, 0.8); color: #4daaf1; padding: 8px 15px; font-size: 1rem; font-family: monospace; z-index: 20; border: 1px solid #3e3e42; }
        
        .line-group { border: 1px solid #3e3e42; margin-bottom: 10px; background: #1e1e1e; }
        .line-header { background: #333337; padding: 8px 10px; font-weight: bold; font-size: 0.85rem; border-bottom: 1px solid #3e3e42; cursor: pointer; display:flex; justify-content: space-between; text-transform: uppercase;}
        .line-header.active { border-left: 4px solid #27ae60; }
        .layer-item { padding: 8px 10px 8px 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2d2d30; font-size: 0.85rem; transition: background 0.2s;}
        .layer-item:hover { background: #2d2d30; }
        .layer-item.active { border-left: 4px solid #0e639c; background: #252526; }
        
        input[type=range] { width: 100%; margin-top: 5px; margin-bottom: 12px; cursor: pointer; accent-color: #0e639c; }
        label { font-size: 0.75rem; color: #d4d4d4; display: flex; justify-content: space-between; }
        .slider-val { font-weight: bold; color: #4daaf1; }
        hr { border: 0; height: 1px; background: #3e3e42; margin: 15px 0; }
        
        /* === NOUVEAU : FICHE RÉCAPITULATIVE === */
        .stats-box { background-color: #1e1e1e; border: 1px solid #3e3e42; padding: 12px; margin-top: 15px; border-left: 4px solid #4daaf1; }
        .stats-title { font-size: 0.8rem; color: #888; text-transform: uppercase; margin-bottom: 10px; text-align: center; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 0.85rem; }
        .stat-val { color: #4daaf1; font-weight: bold; font-family: monospace; font-size: 0.95rem; }
        
        .scale-controls { display: flex; gap: 10px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="sidebar sidebar-left">
            <h2>Snowpark Pro V25</h2>
            <div class="panel"><button class="btn btn-primary">Enregistrer Projet</button></div>
            
            <div class="panel">
                <h3>Topographie (.TIF)</h3>
                <input type="file" id="mnt-upload" accept=".tif,.tiff" style="font-size:0.8rem; color:#d4d4d4; width:100%;">
            </div>
            
            <div class="panel">
                <h3>Catalogue Modules</h3>
                <p style="font-size: 0.7rem; color:#888; margin-top:0;">Ajout à la ligne active</p>
                <div class="module-btn" data-name="Kicker S (Débutant)">KICKER S (Débutant)</div>
                <div class="module-btn" data-name="Kicker M (Intermédiaire)">KICKER M (Intermédiaire)</div>
            </div>
        </div>

        <div class="main-workspace">
            <div id="altitude-box">ALT: -- m</div>
            <div id="map-container"></div>
            <div id="profile-container">
                <button id="close-profile">[X] FERMER</button>
                <canvas id="profileChart"></canvas>
            </div>
        </div>

        <div class="sidebar sidebar-right">
            <h2>Gestionnaire Runs</h2>
            <button class="btn btn-success" id="btn-add-line">+ NOUVELLE LIGNE</button>
            <div id="layer-list-container"></div>

            <div id="properties-panel" class="panel" style="display: none; margin-top: 20px;">
                <h3 id="prop-title" style="color: #fff;">PROPRIÉTÉS</h3>
                
                <button class="btn btn-toggle" id="btn-move-toggle">DÉPLACER SUR CARTE : OFF</button>
                
                <div class="scale-controls">
                    <button class="btn" id="btn-scale-minus">- RÉDUIRE</button>
                    <button class="btn" id="btn-scale-plus">+ AGRANDIR</button>
                </div>

                <hr>
                
                <label>Rotation <span class="slider-val"><span id="angle-display">0</span>°</span></label>
                <input type="range" id="rotation-slider" min="0" max="360" value="0">
                
                <label>Longueur Table <span class="slider-val"><span id="table-display">4</span> m</span></label>
                <input type="range" id="table-slider" min="0" max="40" value="4" step="0.5">
                <label>Longueur Réception <span class="slider-val"><span id="landlen-display">8</span> m</span></label>
                <input type="range" id="landlen-slider" min="2" max="50" value="8" step="0.5">
                
                <hr>
                
                <label>Angle Appel (Kick) <span class="slider-val"><span id="kick-display">15</span>°</span></label>
                <input type="range" id="kick-slider" min="10" max="45" value="15" step="0.5">
                <label>Angle Réception <span class="slider-val"><span id="land-display">25</span>°</span></label>
                <input type="range" id="land-slider" min="5" max="45" value="25" step="0.5">
                
                <hr>
                
                <label>Vitesse Cible <span class="slider-val"><span id="speed-display">40</span> km/h</span></label>
                <input type="range" id="speed-slider" min="5" max="100" value="40">
                <label>Distance Coupe <span class="slider-val"><span id="proj-display">40</span> m</span></label>
                <input type="range" id="proj-slider" min="10" max="150" value="40">
                
                <div class="stats-box">
                    <div class="stats-title">Fiche Récapitulative</div>
                    <div class="stat-row"><span>Volume Neige:</span> <span id="stat-vol" class="stat-val">0.0 m³</span></div>
                    <div class="stat-row"><span>Hauteur Neige Max:</span> <span id="stat-hmax" class="stat-val">0.0 m</span></div>
                    <div class="stat-row"><span>Distance de Vol:</span> <span id="stat-dist" class="stat-val">0.0 m</span></div>
                    <div class="stat-row"><span>APEX (Hauteur Vol):</span> <span id="stat-apex" class="stat-val">0.0 m</span></div>
                </div>

                <button class="btn btn-danger" id="delete-btn">SUPPRIMER MODULE</button>
            </div>
        </div>
    </div>

    <script>
        // === 1. CONFIGURATION GLOBALE ===
        proj4.defs("EPSG:2154", "+proj=lcc +lat_1=49 +lat_2=44 +lat_0=46.5 +lon_0=3 +x_0=700000 +y_0=6600000 +ellps=GRS80 +towgs84=0,0,0,0,0,0,0 +units=m +no_defs");

        const moduleNorms = {
            'Kicker S (Débutant)': { width: 6, kickLen: 3, minKickAngle: 10, maxKickAngle: 25, defaultKickAngle: 15, defaultTable: 4, defaultLandLen: 8, color: '#0e639c' },
            'Kicker M (Intermédiaire)': { width: 8, kickLen: 4, minKickAngle: 15, maxKickAngle: 35, defaultKickAngle: 25, defaultTable: 8, defaultLandLen: 12, color: '#f39c12' }
        };

        let map, chartInstance, currentChartParams = null;
        let activeModule = null, selectedFeatureId = null;
        let isMoveModeActive = false; // Sécurité de déplacement
        let isDragging = false, draggedJustNow = false, startCursorLngLat = null, startBaseCoords = null;
        let isDraggingStartOnChart = false;
        let mntData = null, mntBboxL93 = null, mntWidth = 0, mntHeight = 0;

        let lines = [{ id: 1, name: "RUN PRINCIPAL" }];
        let activeLineId = 1, lineCounter = 1;

        let snowparkFeatures = { type: 'FeatureCollection', features: [] };
        let decorationsFeatures = { type: 'FeatureCollection', features: [] };

        const hoverEl = document.createElement('div');
        hoverEl.style.width = '8px'; hoverEl.style.height = '8px'; hoverEl.style.backgroundColor = '#c74c3c'; hoverEl.style.borderRadius = '50%'; hoverEl.style.boxShadow = '0 0 4px #000';
        const hoverMarker = new maplibregl.Marker({element: hoverEl});

        function getBaseCenter(baseCoords) { const pts = baseCoords[0]; return { lng: (pts[0][0] + pts[2][0])/2, lat: (pts[0][1] + pts[2][1])/2 }; }

        function calculatePolygonCoords(lngLat, widthM, lengthM) {
            const R = 6378137; const lat = lngLat.lat; const lng = lngLat.lng;
            const dLat = (lengthM / 2) / R; const dLng = (widthM / 2) / (R * Math.cos(Math.PI * lat / 180));
            return [[
                [lng - dLng * 180 / Math.PI, lat - dLat * 180 / Math.PI], [lng + dLng * 180 / Math.PI, lat - dLat * 180 / Math.PI],
                [lng + dLng * 180 / Math.PI, lat + dLat * 180 / Math.PI], [lng - dLng * 180 / Math.PI, lat + dLat * 180 / Math.PI],
                [lng - dLng * 180 / Math.PI, lat - dLat * 180 / Math.PI]
            ]];
        }

        function getAltitudeAt(lng, lat) {
            if (!mntData || !mntBboxL93) return null;
            const pt = proj4("EPSG:4326", "EPSG:2154", [lng, lat]);
            if (pt[0] >= mntBboxL93[0] && pt[0] <= mntBboxL93[2] && pt[1] >= mntBboxL93[1] && pt[1] <= mntBboxL93[3]) {
                const xF = ((pt[0] - mntBboxL93[0]) / (mntBboxL93[2] - mntBboxL93[0])) * mntWidth;
                const yF = ((mntBboxL93[3] - pt[1]) / (mntBboxL93[3] - mntBboxL93[1])) * mntHeight;
                const x0 = Math.floor(xF); const x1 = Math.min(x0 + 1, mntWidth - 1);
                const y0 = Math.floor(yF); const y1 = Math.min(y0 + 1, mntHeight - 1);
                const tx = xF - x0; const ty = yF - y0;
                return (1-tx)*(1-ty)*mntData[y0*mntWidth+x0] + tx*(1-ty)*mntData[y0*mntWidth+x1] + (1-tx)*ty*mntData[y1*mntWidth+x0] + tx*ty*mntData[y1*mntWidth+x1];
            }
            return null;
        }

        // === 2. INTERFACE LISTES ===
        function renderLayerList() {
            const container = document.getElementById('layer-list-container');
            container.innerHTML = '';
            lines.forEach(line => {
                const isLineActive = (activeLineId === line.id) ? 'active' : '';
                let lineHtml = `<div class="line-group"><div class="line-header ${isLineActive}" onclick="setActiveLine(${line.id})"><span>[ RUN ] ${line.name}</span></div>`;
                snowparkFeatures.features.filter(f => f.properties.lineId === line.id).forEach((feat, idx) => {
                    const isModActive = (feat.properties.id === selectedFeatureId) ? 'active' : '';
                    lineHtml += `<div class="layer-item ${isModActive}" onclick="selectFeature(${feat.properties.id})"><span>↳ ${idx+1}. ${feat.properties.name}</span></div>`;
                });
                lineHtml += `</div>`;
                container.insertAdjacentHTML('beforeend', lineHtml);
            });
        }

        window.setActiveLine = function(id) { activeLineId = id; renderLayerList(); }
        document.getElementById('btn-add-line').addEventListener('click', () => { lineCounter++; const newLine = { id: lineCounter, name: `LIGNE ${lineCounter}` }; lines.push(newLine); activeLineId = newLine.id; renderLayerList(); });

        function refreshMapData() {
            map.getSource('snowpark-data').setData(snowparkFeatures);
            refreshDecorations();
        }

        function refreshDecorations() {
            decorationsFeatures.features = [];
            snowparkFeatures.features.forEach(feat => {
                const coords = feat.geometry.coordinates[0];
                const ptHaut = turf.point([(coords[3][0]+coords[2][0])/2, (coords[3][1]+coords[2][1])/2]);
                const ptBas = turf.point([(coords[0][0]+coords[1][0])/2, (coords[0][1]+coords[1][1])/2]);
                const bearing = turf.bearing(ptHaut, ptBas);
                
                const amontPt = turf.destination(ptHaut, feat.properties.projectionDist, bearing - 180, {units: 'meters'});
                const avalPt = turf.destination(amontPt, feat.properties.projectionDist*2 + turf.distance(ptHaut, ptBas, {units: 'meters'}), bearing, {units: 'meters'});
                decorationsFeatures.features.push({ type: 'Feature', properties: { type: 'axis' }, geometry: { type: 'LineString', coordinates: [amontPt.geometry.coordinates, avalPt.geometry.coordinates] }});
                
                const kL = feat.properties.kickLen; const tL = feat.properties.tableLen;
                [[kL, 'zone'], [kL+tL, 'zone']].forEach(z => {
                    const lA = turf.destination(turf.point(coords[3]), z[0], bearing, {units: 'meters'}).geometry.coordinates;
                    const lB = turf.destination(turf.point(coords[2]), z[0], bearing, {units: 'meters'}).geometry.coordinates;
                    decorationsFeatures.features.push({ type: 'Feature', properties: { type: z[1] }, geometry: { type: 'LineString', coordinates: [lA, lB] }});
                });

                const vMps = feat.properties.speed / 3.6;
                const hNeeded = (vMps * vMps) / (2 * 9.81 * 0.9);
                let zStartKicker = getAltitudeAt(ptHaut.geometry.coordinates[0], ptHaut.geometry.coordinates[1]) || 0;
                
                for(let d=1; d<200; d+=0.5) {
                    const checkPt = turf.destination(ptHaut, d, bearing - 180, {units: 'meters'});
                    const zCheck = getAltitudeAt(checkPt.geometry.coordinates[0], checkPt.geometry.coordinates[1]);
                    if (zCheck && (zCheck - zStartKicker) >= hNeeded) {
                        const pLeft = turf.destination(checkPt, 3, bearing - 90, {units: 'meters'}).geometry.coordinates;
                        const pRight = turf.destination(checkPt, 3, bearing + 90, {units: 'meters'}).geometry.coordinates;
                        decorationsFeatures.features.push({ type: 'Feature', properties: { type: 'start' }, geometry: { type: 'LineString', coordinates: [pLeft, pRight] }});
                        break;
                    }
                }
            });
            map.getSource('decorations-data').setData(decorationsFeatures);
        }

        // === 3. CALCULS ET AFFICHAGE PHYSIQUE ===
        function updateProfileChart(feat) {
            const coords = feat.geometry.coordinates[0];
            const ptHaut = turf.point([(coords[3][0]+coords[2][0])/2, (coords[3][1]+coords[2][1])/2]);
            const ptBas = turf.point([(coords[0][0]+coords[1][0])/2, (coords[0][1]+coords[1][1])/2]);
            const bearing = turf.bearing(ptHaut, ptBas);
            const kickerLength = turf.distance(ptHaut, ptBas, {units: 'meters'});
            
            const projDist = feat.properties.projectionDist;
            const kickAngle = feat.properties.kickAngle;
            const landAngle = feat.properties.landingAngle;
            const speedKmh = feat.properties.speed;
            const kickLen = feat.properties.kickLen;
            const tableLen = feat.properties.tableLen;
            const moduleWidth = feat.properties.width;

            const vMps = speedKmh / 3.6;
            const hNeeded = (vMps * vMps) / (2 * 9.81 * 0.9);
            let zStartKicker = getAltitudeAt(ptHaut.geometry.coordinates[0], ptHaut.geometry.coordinates[1]) || 0;
            
            let startDistanceX = null;
            for(let d=1; d<200; d+=0.5) {
                const checkPt = turf.destination(ptHaut, d, bearing - 180, {units: 'meters'});
                const zCheck = getAltitudeAt(checkPt.geometry.coordinates[0], checkPt.geometry.coordinates[1]);
                if (zCheck && (zCheck - zStartKicker) >= hNeeded) { startDistanceX = projDist - d; break; }
            }

            const amontPt = turf.destination(ptHaut, projDist, bearing - 180, {units: 'meters'});
            const totalDistance = projDist * 2 + kickerLength;
            const steps = 120;
            currentChartParams = { amontPt, bearing, totalDistance, steps, projDist, zStartKicker, startDistanceX };

            const labels = [], terrainData = [], kickerData = [], trajData = [];
            const zKickEnd = zStartKicker + (kickLen * Math.tan(kickAngle * Math.PI / 180));
            const lipDist = projDist + kickLen;
            const v0 = vMps; const theta = kickAngle * Math.PI / 180; const g = 9.81;
            const apexStr = ((v0 * Math.sin(theta))**2 / (2 * g)).toFixed(2);
            let hasLanded = false; let maxZ = -1000;

            // Stats
            let crossSectionArea = 0;
            let maxSnowDepth = 0;
            let jumpDistance = 0;
            const deltaX = totalDistance / steps;

            for(let i=0; i<=steps; i++) {
                const fraction = i/steps; const curD = fraction * totalDistance;
                const ptX = turf.destination(amontPt, curD, bearing, {units: 'meters'});
                labels.push(curD.toFixed(1) + 'm');
                
                const zTerrain = getAltitudeAt(ptX.geometry.coordinates[0], ptX.geometry.coordinates[1]) || 0;
                terrainData.push(zTerrain);
                if (zTerrain > maxZ) maxZ = zTerrain;

                let zK = null;
                if (curD >= projDist && curD <= projDist + kickerLength) {
                    const d = curD - projDist;
                    if (d <= kickLen) zK = zStartKicker + (d * Math.tan(kickAngle * Math.PI / 180));
                    else if (d <= kickLen + tableLen) zK = zKickEnd;
                    else zK = zKickEnd - ((d - kickLen - tableLen) * Math.tan(landAngle * Math.PI / 180));
                    
                    if (zK > zTerrain) {
                        let depth = zK - zTerrain;
                        crossSectionArea += depth * deltaX;
                        if (depth > maxSnowDepth) maxSnowDepth = depth;
                    }
                }
                kickerData.push(zK);
                if (zK > maxZ) maxZ = zK;

                if (curD >= lipDist && !hasLanded) {
                    const t = (curD - lipDist) / (v0 * Math.cos(theta));
                    const zTraj = zKickEnd + (v0 * Math.sin(theta) * t) - (0.5 * g * t * t);
                    if (zTraj >= (zK || zTerrain)) {
                        trajData.push(zTraj);
                    } else { 
                        trajData.push(zK || zTerrain); 
                        hasLanded = true; 
                        jumpDistance = curD - lipDist;
                    }
                    if (zTraj > maxZ) maxZ = zTraj;
                } else trajData.push(null);
            }

            // Mettre à jour la Fiche Récapitulative
            const estimatedVolume = crossSectionArea * moduleWidth;
            document.getElementById('stat-vol').innerText = estimatedVolume.toFixed(1) + ' m³';
            document.getElementById('stat-hmax').innerText = maxSnowDepth.toFixed(1) + ' m';
            document.getElementById('stat-dist').innerText = jumpDistance > 0 ? jumpDistance.toFixed(1) + ' m' : '--';
            document.getElementById('stat-apex').innerText = apexStr + ' m';

            document.getElementById('profile-container').style.display = 'block'; map.resize();
            const ctx = document.getElementById('profileChart').getContext('2d');
            Chart.defaults.color = '#888'; Chart.defaults.font.family = 'Segoe UI';

            const startLinePlugin = {
                id: 'startLine',
                afterDraw: chart => {
                    if (currentChartParams && currentChartParams.startDistanceX !== null) {
                        const xAxis = chart.scales.x; const yAxis = chart.scales.y;
                        const xIndex = (currentChartParams.startDistanceX / currentChartParams.totalDistance) * currentChartParams.steps;
                        const xPos = xAxis.getPixelForValue(xIndex);
                        const c = chart.ctx; c.save();
                        c.beginPath(); c.moveTo(xPos, yAxis.top); c.lineTo(xPos, yAxis.bottom);
                        c.lineWidth = 2; c.strokeStyle = '#27ae60'; c.stroke();
                        c.fillStyle = '#27ae60'; c.fillRect(xPos - 20, yAxis.top, 40, 16);
                        c.fillStyle = '#fff'; c.font = 'bold 9px Arial'; c.textAlign = 'center'; c.fillText('START', xPos, yAxis.top + 11); c.restore();
                    }
                    if (chart.tooltip?._active?.length && !isDraggingStartOnChart) {
                        let x = chart.tooltip._active[0].element.x; let yAxis = chart.scales.y; let c = chart.ctx;
                        c.save(); c.beginPath(); c.setLineDash([2, 2]); c.moveTo(x, yAxis.top); c.lineTo(x, yAxis.bottom);
                        c.lineWidth = 1; c.strokeStyle = '#888'; c.stroke(); c.restore();
                    }
                }
            };

            if (chartInstance) {
                chartInstance.options.scales.y.max = maxZ + 5;
                chartInstance.data.labels = labels; chartInstance.data.datasets[0].data = terrainData;
                chartInstance.data.datasets[1].data = kickerData; chartInstance.data.datasets[2].data = trajData;
                chartInstance.update();
            } else {
                chartInstance = new Chart(ctx, {
                    type: 'line',
                    data: { labels: labels, datasets: [
                        { label: 'Terrain', data: terrainData, borderColor: '#7f8c8d', backgroundColor: 'rgba(127, 140, 141, 0.2)', fill: true, pointRadius: 0, tension: 0.1, borderWidth: 1 },
                        { label: 'Neige', data: kickerData, borderColor: '#0e639c', backgroundColor: 'rgba(14, 99, 156, 0.4)', fill: true, pointRadius: 0, tension: 0, borderWidth: 2 },
                        { label: 'Trajectoire', data: trajData, borderColor: '#c74c3c', borderDash: [4,4], borderWidth: 2, pointRadius: 0, tension: 0.3 }
                    ]},
                    options: { 
                        responsive: true, maintainAspectRatio: false, animation: false,
                        plugins: { legend: { display: false }, tooltip: { mode: 'index', intersect: false } },
                        scales: { y: { max: maxZ + 5, grid: { color: '#333' } }, x: { grid: { color: '#333' }, ticks: { maxTicksLimit: 10 } } },
                        onHover: (e, active) => {
                            if(!isDraggingStartOnChart && active.length > 0 && currentChartParams) {
                                const pt = turf.destination(currentChartParams.amontPt, (active[0].index/currentChartParams.steps)*currentChartParams.totalDistance, currentChartParams.bearing, {units: 'meters'});
                                hoverMarker.setLngLat(pt.geometry.coordinates).addTo(map);
                            }
                        }
                    },
                    plugins: [startLinePlugin]
                });
            }
        }

        // === 4. DRAG START CANVAS ===
        const canvas = document.getElementById('profileChart');
        canvas.addEventListener('mousedown', (e) => {
            if (!chartInstance || !currentChartParams || currentChartParams.startDistanceX === null) return;
            const xIndex = chartInstance.scales.x.getValueForPixel(e.offsetX);
            const distClick = (xIndex / currentChartParams.steps) * currentChartParams.totalDistance;
            if (Math.abs(distClick - currentChartParams.startDistanceX) < 3) { isDraggingStartOnChart = true; canvas.style.cursor = 'ew-resize'; }
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!chartInstance || !currentChartParams) return;
            const xIndex = Math.max(0, Math.min(currentChartParams.steps, chartInstance.scales.x.getValueForPixel(e.offsetX)));
            const distHover = (xIndex / currentChartParams.steps) * currentChartParams.totalDistance;

            if (isDraggingStartOnChart && selectedFeatureId) {
                let newStartDist = distHover;
                if (newStartDist >= currentChartParams.projDist - 1) newStartDist = currentChartParams.projDist - 1;

                const feat = snowparkFeatures.features.find(f => f.properties.id === selectedFeatureId);
                const ptX = turf.destination(currentChartParams.amontPt, newStartDist, currentChartParams.bearing, {units: 'meters'});
                const zStart = getAltitudeAt(ptX.geometry.coordinates[0], ptX.geometry.coordinates[1]);

                if (zStart !== null) {
                    const deltaH = zStart - currentChartParams.zStartKicker;
                    if (deltaH > 0) { 
                        const vMps = Math.sqrt(deltaH * 2 * 9.81 * 0.9);
                        let speedKmh = Math.max(5, Math.min(100, vMps * 3.6)); 
                        feat.properties.speed = speedKmh;
                        document.getElementById('speed-slider').value = speedKmh; document.getElementById('speed-display').innerText = speedKmh.toFixed(1);
                        updateProfileChart(feat); refreshDecorations(); 
                    }
                }
            } else {
                if (currentChartParams.startDistanceX !== null && Math.abs(distHover - currentChartParams.startDistanceX) < 3) canvas.style.cursor = 'ew-resize';
                else canvas.style.cursor = 'default';
            }
        });
        window.addEventListener('mouseup', () => { if (isDraggingStartOnChart) { isDraggingStartOnChart = false; canvas.style.cursor = 'default'; } });

        // === 5. INITIALISATION ===
        document.addEventListener('DOMContentLoaded', () => {
            map = new maplibregl.Map({ 
                container: 'map-container', 
                style: { 'version': 8, 'sources': { 's': { 'type': 'raster', 'tiles': ['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'], 'tileSize': 256 } }, 'layers': [{ 'id': 's', 'type': 'raster', 'source': 's' }] }, 
                center: [0.5936, 42.7610], zoom: 14 
            });
            map.addControl(new maplibregl.NavigationControl(), 'top-right');

            map.on('load', () => {
                map.addSource('snowpark-data', { type: 'geojson', data: snowparkFeatures });
                map.addLayer({ id: 'modules-fill', type: 'fill', source: 'snowpark-data', paint: { 'fill-color': ['get', 'color'], 'fill-opacity': 0.5 } });
                map.addLayer({ id: 'modules-outline', type: 'line', source: 'snowpark-data', paint: { 'line-color': ['case', ['boolean', ['feature-state', 'selected'], false], '#0e639c', '#fff'], 'line-width': ['case', ['boolean', ['feature-state', 'selected'], false], 2, 1] } });
                
                map.addSource('decorations-data', { type: 'geojson', data: decorationsFeatures });
                map.addLayer({ id: 'axis-layer', type: 'line', source: 'decorations-data', filter: ['==', 'type', 'axis'], paint: { 'line-color': '#f39c12', 'line-width': 1, 'line-dasharray': [4, 4] } });
                map.addLayer({ id: 'zone-layer', type: 'line', source: 'decorations-data', filter: ['==', 'type', 'zone'], paint: { 'line-color': '#fff', 'line-width': 1, 'line-dasharray': [2, 2] } });
                map.addLayer({ id: 'start-layer', type: 'line', source: 'decorations-data', filter: ['==', 'type', 'start'], paint: { 'line-color': '#27ae60', 'line-width': 4 } }); 
            });

            document.getElementById('mnt-upload').addEventListener('change', async (e) => {
                document.getElementById('altitude-box').innerText = "Lecture TIFF...";
                const tiff = await GeoTIFF.fromBlob(e.target.files[0]); const img = await tiff.getImage();
                mntBboxL93 = img.getBoundingBox(); mntWidth = img.getWidth(); mntHeight = img.getHeight(); mntData = (await img.readRasters())[0];
                const bl = proj4("EPSG:2154", "EPSG:4326", [mntBboxL93[0], mntBboxL93[1]]); const tr = proj4("EPSG:2154", "EPSG:4326", [mntBboxL93[2], mntBboxL93[3]]);
                map.fitBounds([bl, tr], { padding: 40 }); document.getElementById('altitude-box').innerText = "MNT Actif";
            });

            map.on('mousemove', (e) => {
                const alt = getAltitudeAt(e.lngLat.lng, e.lngLat.lat);
                document.getElementById('altitude-box').innerText = alt ? `ALT: ${alt.toFixed(2)}m` : "Hors zone MNT";
            });

            const mods = document.querySelectorAll('.module-btn');
            mods.forEach(m => m.addEventListener('click', (e) => {
                activeModule = (activeModule === e.target.getAttribute('data-name')) ? null : e.target.getAttribute('data-name');
                mods.forEach(b => b.classList.toggle('active', activeModule === b.getAttribute('data-name')));
                map.getCanvas().style.cursor = activeModule ? 'crosshair' : '';
            }));

            map.on('click', (e) => {
                if (draggedJustNow) return;
                if (activeModule) {
                    const n = moduleNorms[activeModule]; const id = Date.now();
                    const c = calculatePolygonCoords(e.lngLat, n.width, n.kickLen + n.defaultTable + n.defaultLandLen);
                    const nf = { id, type: 'Feature', properties: { 
                        id, name: activeModule, lineId: activeLineId, visible: true, color: n.color, 
                        rotation: 0, projectionDist: 40, speed: 40, 
                        width: n.width, kickLen: n.kickLen, tableLen: n.defaultTable, landLen: n.defaultLandLen, 
                        kickAngle: n.defaultKickAngle, landingAngle: 25, baseCoords: JSON.stringify(c) 
                    }, geometry: { type: 'Polygon', coordinates: c } };
                    snowparkFeatures.features.push(nf); refreshMapData(); selectFeature(id);
                    activeModule = null; mods.forEach(b => b.classList.remove('active')); map.getCanvas().style.cursor = '';
                } else if (!map.queryRenderedFeatures(e.point, { layers: ['modules-fill'] }).length) deselectFeature();
            });

            // BOUTON DE DEPLACEMENT ON/OFF
            document.getElementById('btn-move-toggle').addEventListener('click', (e) => {
                isMoveModeActive = !isMoveModeActive;
                if (isMoveModeActive) {
                    e.target.classList.add('active');
                    e.target.innerText = 'DÉPLACER SUR CARTE : ON';
                } else {
                    e.target.classList.remove('active');
                    e.target.innerText = 'DÉPLACER SUR CARTE : OFF';
                }
            });

            // DRAG AND DROP SÉCURISÉ
            map.on('mousedown', 'modules-fill', (e) => {
                if (activeModule) return; 
                e.preventDefault(); 
                
                const id = e.features[0].properties.id; 
                selectFeature(id);
                
                if (isMoveModeActive) {
                    isDragging = true; map.dragPan.disable(); startCursorLngLat = e.lngLat;
                    startBaseCoords = JSON.parse(snowparkFeatures.features.find(f => f.properties.id === id).properties.baseCoords);
                }
            });

            map.on('mousemove', (e) => {
                if (!isDragging || !selectedFeatureId) return;
                map.getCanvas().style.cursor = 'move';
                const feat = snowparkFeatures.features.find(f => f.properties.id === selectedFeatureId);
                const lngOffset = e.lngLat.lng - startCursorLngLat.lng; const latOffset = e.lngLat.lat - startCursorLngLat.lat;
                const newBaseCoords = startBaseCoords[0].map(c => [c[0] + lngOffset, c[1] + latOffset]);
                feat.properties.baseCoords = JSON.stringify([newBaseCoords]);
                feat.geometry.coordinates = turf.transformRotate(turf.polygon([newBaseCoords]), feat.properties.rotation).geometry.coordinates;
                refreshMapData(); updateProfileChart(feat); 
            });

            map.on('mouseup', () => { 
                if(isDragging) { isDragging=false; map.getCanvas().style.cursor = ''; draggedJustNow=true; setTimeout(()=>draggedJustNow=false,100); map.dragPan.enable(); }
            });

            // BOUTONS D'ÉCHELLE (Scale)
            document.getElementById('btn-scale-minus').addEventListener('click', () => scaleFeature(0.9));
            document.getElementById('btn-scale-plus').addEventListener('click', () => scaleFeature(1.1));

            function scaleFeature(factor) {
                if(!selectedFeatureId) return;
                const f = snowparkFeatures.features.find(x => x.properties.id === selectedFeatureId);
                f.properties.width *= factor;
                f.properties.kickLen *= factor;
                f.properties.tableLen *= factor;
                f.properties.landLen *= factor;
                
                document.getElementById('table-slider').value = f.properties.tableLen; document.getElementById('table-display').innerText = f.properties.tableLen.toFixed(1);
                document.getElementById('landlen-slider').value = f.properties.landLen; document.getElementById('landlen-display').innerText = f.properties.landLen.toFixed(1);
                
                const newTotalLen = f.properties.kickLen + f.properties.tableLen + f.properties.landLen;
                const center = getBaseCenter(JSON.parse(f.properties.baseCoords)); 
                const newCoords = calculatePolygonCoords(center, f.properties.width, newTotalLen);
                f.properties.baseCoords = JSON.stringify(newCoords); 
                f.geometry.coordinates = turf.transformRotate(turf.polygon(newCoords), f.properties.rotation).geometry.coordinates;
                refreshMapData(); updateProfileChart(f);
            }

            document.getElementById('close-profile').addEventListener('click', deselectFeature);
            document.getElementById('delete-btn').addEventListener('click', () => { snowparkFeatures.features = snowparkFeatures.features.filter(x => x.properties.id !== selectedFeatureId); deselectFeature(); });

            function syncSlider(propName, sliderId, displayId, isLength) {
                document.getElementById(sliderId).addEventListener('input', (e) => {
                    if(!selectedFeatureId) return;
                    const val = parseFloat(e.target.value); document.getElementById(displayId).innerText = val;
                    const f = snowparkFeatures.features.find(x => x.properties.id === selectedFeatureId);
                    f.properties[propName] = val;
                    if (isLength) { 
                        const newTotalLen = f.properties.kickLen + f.properties.tableLen + f.properties.landLen;
                        const center = getBaseCenter(JSON.parse(f.properties.baseCoords)); const newCoords = calculatePolygonCoords(center, f.properties.width, newTotalLen);
                        f.properties.baseCoords = JSON.stringify(newCoords); f.geometry.coordinates = turf.transformRotate(turf.polygon(newCoords), f.properties.rotation).geometry.coordinates;
                    } else if (propName === 'rotation') {
                        f.geometry.coordinates = turf.transformRotate(turf.polygon(JSON.parse(f.properties.baseCoords)), val).geometry.coordinates;
                    }
                    refreshMapData(); updateProfileChart(f);
                });
            }
            syncSlider('rotation', 'rotation-slider', 'angle-display', false); syncSlider('tableLen', 'table-slider', 'table-display', true);
            syncSlider('landLen', 'landlen-slider', 'landlen-display', true); syncSlider('kickAngle', 'kick-slider', 'kick-display', false);
            syncSlider('landingAngle', 'land-slider', 'land-display', false); syncSlider('speed', 'speed-slider', 'speed-display', false);
            syncSlider('projectionDist', 'proj-slider', 'proj-display', false);
        });

        window.selectFeature = function(id) {
            if(selectedFeatureId) map.setFeatureState({ source: 'snowpark-data', id: selectedFeatureId }, { selected: false });
            selectedFeatureId = id; map.setFeatureState({ source: 'snowpark-data', id: selectedFeatureId }, { selected: true });
            
            // Désactiver le déplacement par défaut à la sélection
            isMoveModeActive = false;
            document.getElementById('btn-move-toggle').classList.remove('active');
            document.getElementById('btn-move-toggle').innerText = 'DÉPLACER SUR CARTE : OFF';

            const f = snowparkFeatures.features.find(x => x.properties.id === id);
            const center = getBaseCenter(JSON.parse(f.properties.baseCoords));
            map.flyTo({ center: [center.lng, center.lat], zoom: 19, speed: 1.2, curve: 1 });
            
            document.getElementById('properties-panel').style.display = 'block'; 
            document.getElementById('prop-title').innerText = f.properties.name;
            document.getElementById('kick-slider').min = moduleNorms[f.properties.name].minKickAngle; 
            document.getElementById('kick-slider').max = moduleNorms[f.properties.name].maxKickAngle;
            
            ['rotation', 'speed', 'table', 'landlen', 'kick', 'land', 'proj'].forEach(p => {
                let sid = (p==='table'?'table-slider':p==='landlen'?'landlen-slider':p==='land'?'land-slider':p==='proj'?'proj-slider':p+'-slider');
                let val = (p==='table'?f.properties.tableLen:p==='landlen'?f.properties.landLen:p==='proj'?f.properties.projectionDist:p==='land'?f.properties.landingAngle:f.properties[p+(p==='kick'?'Angle':'')]);
                document.getElementById(sid).value = val; document.getElementById(p+'-display').innerText = val;
            });
            renderLayerList(); updateProfileChart(f);
        }

        function deselectFeature() {
            if(selectedFeatureId) map.setFeatureState({ source: 'snowpark-data', id: selectedFeatureId }, { selected: false });
            selectedFeatureId = null; 
            isMoveModeActive = false;
            document.getElementById('btn-move-toggle').classList.remove('active');
            document.getElementById('btn-move-toggle').innerText = 'DÉPLACER SUR CARTE : OFF';
            document.getElementById('properties-panel').style.display = 'none'; 
            document.getElementById('profile-container').style.display = 'none'; 
            hoverMarker.remove(); renderLayerList(); refreshMapData(); map.resize();
        }
    </script>
</body>
</html>
