<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snowpark Designer Pro</title>
    
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; color: #333; }
        .app-container { display: flex; height: 100vh; width: 100vw; }
        .sidebar { width: 320px; background-color: #2c3e50; color: #ecf0f1; padding: 20px; box-sizing: border-box; overflow-y: auto; z-index: 10; box-shadow: 2px 0 5px rgba(0,0,0,0.2); }
        .sidebar h2 { margin-top: 0; font-size: 1.5rem; border-bottom: 1px solid #34495e; padding-bottom: 15px; }
        .panel { background-color: #34495e; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .panel h3 { margin-top: 0; font-size: 1.1rem; color: #3498db; }
        .btn { width: 100%; padding: 10px; margin-bottom: 10px; border: none; border-radius: 5px; background-color: #7f8c8d; color: white; cursor: pointer; font-weight: bold; }
        .btn-primary { background-color: #27ae60; }
        .btn-danger { background-color: #e74c3c; margin-top: 15px; }
        .module-btn { background-color: #e67e22; padding: 10px; margin-bottom: 8px; text-align: center; border-radius: 4px; cursor: pointer; font-weight: bold; transition: all 0.2s; }
        .main-workspace { flex-grow: 1; position: relative; }
        /* Fond gris clair pour bien voir si la zone de la carte charge */
        #map-container { position: absolute; top: 0; bottom: 0; width: 100%; background-color: #dcdde1; }
        input[type=range] { width: 100%; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="sidebar">
            <h2>🛠️ Snowpark Pro v8</h2>
            
            <div class="panel">
                <h3>📂 Gestion de Projet</h3>
                <button class="btn btn-primary">Enregistrer</button>
            </div>

            <div class="panel" id="edit-panel" style="display: none; border: 2px solid #3498db;">
                <h3>⚙️ Édition du Module</h3>
                <p id="edit-name" style="font-weight: bold; color: #e67e22; margin-top: 0;"></p>
                
                <label for="rotation-slider" style="font-size: 0.9rem;">Orientation (<span id="angle-display">0</span>°)</label>
                <input type="range" id="rotation-slider" min="0" max="360" value="0">
                
                <button class="btn btn-danger" id="delete-btn">🗑️ Supprimer</button>
            </div>

            <div class="panel">
                <h3>⛷️ Modules (Norme)</h3>
                <div class="module-btn">Kicker S (Débutant)</div>
                <div class="module-btn">Kicker M (Intermédiaire)</div>
                <div class="module-btn">Rail Plat (6m)</div>
            </div>
        </div>

        <div class="main-workspace">
            <div id="map-container"></div>
        </div>
    </div>

    <script>
        let map;
        let activeModule = null;
        let selectedFeatureId = null;

        const moduleNorms = {
            'Kicker S (Débutant)': { width: 10, length: 15, color: '#2ecc71' },
            'Kicker M (Intermédiaire)': { width: 15, length: 22, color: '#f1c40f' },
            'Rail Plat (6m)': { width: 2, length: 6, color: '#e74c3c' }
        };

        let snowparkFeatures = { type: 'FeatureCollection', features: [] };

        function calculatePolygonCoords(lngLat, widthM, lengthM) {
            const R = 6378137;
            const lat = lngLat.lat;
            const lng = lngLat.lng;
            const dLat = (lengthM / 2) / R;
            const dLng = (widthM / 2) / (R * Math.cos(Math.PI * lat / 180));
            
            const dLatDeg = dLat * 180 / Math.PI;
            const dLngDeg = dLng * 180 / Math.PI;
            
            return [[
                [lng - dLngDeg, lat - dLatDeg],
                [lng + dLngDeg, lat - dLatDeg],
                [lng + dLngDeg, lat + dLatDeg],
                [lng - dLngDeg, lat + dLatDeg],
                [lng - dLngDeg, lat - dLatDeg]
            ]];
        }

        document.addEventListener('DOMContentLoaded', () => {
            
            map = new maplibregl.Map({
                container: 'map-container',
                style: {
                    'version': 8,
                    'sources': { 'osm': { 'type': 'raster', 'tiles': ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'], 'tileSize': 256 } },
                    'layers': [{ 'id': 'osm-layer', 'type': 'raster', 'source': 'osm' }]
                },
                center: [0.5936, 42.7610],
                zoom: 18
            });

            map.addControl(new maplibregl.NavigationControl(), 'top-right');

            map.on('load', () => {
                map.addSource('snowpark-data', { type: 'geojson', data: snowparkFeatures });
                
                map.addLayer({
                    id: 'modules-fill',
                    type: 'fill',
                    source: 'snowpark-data',
                    paint: { 'fill-color': ['get', 'color'], 'fill-opacity': 0.6 }
                });

                map.addLayer({
                    id: 'modules-outline',
                    type: 'line',
                    source: 'snowpark-data',
                    paint: {
                        'line-color': ['case', ['boolean', ['feature-state', 'selected'], false], '#e74c3c', '#000'],
                        'line-width': ['case', ['boolean', ['feature-state', 'selected'], false], 4, 2]
                    }
                });
            });

            // CLIC BARRE DE GAUCHE
            const modules = document.querySelectorAll('.module-btn');
            modules.forEach(mod => {
                mod.addEventListener('click', (e) => {
                    deselectCurrentFeature();
                    modules.forEach(m => m.style.border = 'none');
                    if (activeModule === e.target.innerText) {
                        activeModule = null;
                        if(map) map.getCanvas().style.cursor = ''; 
                    } else {
                        activeModule = e.target.innerText;
                        e.target.style.border = '3px solid #2ecc71'; 
                        if(map) map.getCanvas().style.cursor = 'crosshair'; 
                    }
                });
            });

            // CLIC CARTE
            map.on('click', (e) => {
                if (activeModule) {
                    const norm = moduleNorms[activeModule];
                    const coords = calculatePolygonCoords(e.lngLat, norm.width, norm.length);
                    const uniqueId = Date.now();

                    const newFeature = {
                        id: uniqueId,
                        type: 'Feature',
                        properties: {
                            id: uniqueId,
                            name: activeModule,
                            color: norm.color,
                            rotation: 0,
                            baseCoords: JSON.stringify(coords) 
                        },
                        geometry: { type: 'Polygon', coordinates: coords }
                    };

                    snowparkFeatures.features.push(newFeature);
                    map.getSource('snowpark-data').setData(snowparkFeatures);

                    activeModule = null;
                    modules.forEach(m => m.style.border = 'none');
                    map.getCanvas().style.cursor = '';
                    return;
                }

                const clickedFeatures = map.queryRenderedFeatures(e.point, { layers: ['modules-fill'] });
                if (clickedFeatures.length > 0) {
                    selectFeature(clickedFeatures[0].properties.id);
                } else {
                    deselectCurrentFeature();
                }
            });

            function selectFeature(id) {
                deselectCurrentFeature();
                selectedFeatureId = id;
                map.setFeatureState({ source: 'snowpark-data', id: selectedFeatureId }, { selected: true });
                const feat = snowparkFeatures.features.find(f => f.properties.id === selectedFeatureId);
                
                document.getElementById('edit-panel').style.display = 'block';
                document.getElementById('edit-name').innerText = feat.properties.name;
                document.getElementById('rotation-slider').value = feat.properties.rotation;
                document.getElementById('angle-display').innerText = feat.properties.rotation;
            }

            function deselectCurrentFeature() {
                if (selectedFeatureId) {
                    map.setFeatureState({ source: 'snowpark-data', id: selectedFeatureId }, { selected: false });
                    selectedFeatureId = null;
                    document.getElementById('edit-panel').style.display = 'none';
                }
            }

            document.getElementById('rotation-slider').addEventListener('input', (e) => {
                if (selectedFeatureId) {
                    const angle = parseFloat(e.target.value);
                    document.getElementById('angle-display').innerText = angle;
                    
                    const featureIndex = snowparkFeatures.features.findIndex(f => f.properties.id === selectedFeatureId);
                    const feat = snowparkFeatures.features[featureIndex];
                    feat.properties.rotation = angle;
                    
                    const baseCoords = JSON.parse(feat.properties.baseCoords);
                    const basePoly = turf.polygon(baseCoords);
                    const rotatedPoly = turf.transformRotate(basePoly, angle);
                    
                    feat.geometry.coordinates = rotatedPoly.geometry.coordinates;
                    map.getSource('snowpark-data').setData(snowparkFeatures);
                }
            });

            document.getElementById('delete-btn').addEventListener('click', () => {
                if (selectedFeatureId) {
                    snowparkFeatures.features = snowparkFeatures.features.filter(f => f.properties.id !== selectedFeatureId);
                    map.getSource('snowpark-data').setData(snowparkFeatures);
                    deselectCurrentFeature();
                }
            });
        });
    </script>
</body>
</html>
