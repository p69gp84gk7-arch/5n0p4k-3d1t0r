<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snowpark Designer Pro</title>
    
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/geotiff@2.1.3/dist-browser/geotiff.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; color: #333; overflow: hidden; }
        .app-container { display: flex; height: 100vh; width: 100vw; }
        .sidebar { width: 340px; background-color: #2c3e50; color: #ecf0f1; padding: 20px; box-sizing: border-box; overflow-y: auto; z-index: 10; box-shadow: 2px 0 5px rgba(0,0,0,0.2); }
        .sidebar h2 { margin-top: 0; font-size: 1.5rem; border-bottom: 1px solid #34495e; padding-bottom: 15px; }
        .panel { background-color: #34495e; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .panel h3 { margin-top: 0; font-size: 1.1rem; color: #3498db; }
        .btn { width: 100%; padding: 10px; margin-bottom: 10px; border: none; border-radius: 5px; background-color: #7f8c8d; color: white; cursor: pointer; font-weight: bold; }
        .btn-primary { background-color: #27ae60; }
        .btn-danger { background-color: #e74c3c; margin-top: 15px; }
        .module-btn { background-color: #e67e22; padding: 10px; margin-bottom: 8px; text-align: center; border-radius: 4px; cursor: pointer; font-weight: bold; transition: all 0.2s; }
        .main-workspace { flex-grow: 1; position: relative; display: flex; flex-direction: column; }
        #map-container { flex-grow: 1; position: relative; background-color: #2c3e50; } 
        
        #profile-container { height: 350px; background: white; border-top: 3px solid #34495e; padding: 10px; box-sizing: border-box; display: none; position: relative; }
        #close-profile { position: absolute; top: 5px; right: 10px; background: none; border: none; font-size: 1.2rem; cursor: pointer; }
        
        #altitude-box { position: absolute; top: 20px; left: 20px; background-color: rgba(44, 62, 80, 0.9); color: #2ecc71; padding: 10px 20px; border-radius: 5px; font-size: 1.2rem; font-weight: bold; z-index: 20; box-shadow: 0 4px 6px rgba(0,0,0,0.5); border: 2px solid #34495e; }
        
        input[type=range] { width: 100%; margin-top: 2px; margin-bottom: 8px; cursor: pointer; }
        label { font-size: 0.8rem; color: #ecf0f1; display: block; margin-top: 5px; }
        .slider-val { font-weight: bold; color: #f1c40f; }
        hr { border: 0; height: 1px; background: #2c3e50; margin: 10px 0; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="sidebar">
            <h2>🛠️ Snowpark Pro v19</h2>
            <div class="panel">
                <h3>🗺️ Topographie (MNT)</h3>
                <input type="file" id="mnt-upload" accept=".tif,.tiff">
            </div>
            
            <div class="panel" id="edit-panel" style="display: none; border: 2px solid #3498db;">
                <h3>⚙️ Édition du Module</h3>
                <p id="edit-name" style="font-weight: bold; color: #e67e22; margin-top: 0;"></p>
                <label>Vitesse cible (<span class="slider-val" id="speed-display">40</span> km/h)</label>
                <input type="range" id="speed-slider" min="5" max="100" value="40">
                <hr>
                <label>Rotation (<span class="slider-val" id="angle-display">0</span>°)</label>
                <input type="range" id="rotation-slider" min="0" max="360" value="0">
                <label>Table (<span class="slider-val" id="table-display">4</span> m)</label>
                <input type="range" id="table-slider" min="0" max="25" value="4" step="0.5">
                <label>Réception (<span class="slider-val" id="landlen-display">8</span> m)</label>
                <input type="range" id="landlen-slider" min="2" max="30" value="8" step="0.5">
                <label>Angle Kick (<span class="slider-val" id="kick-display">15</span>°)</label>
                <input type="range" id="kick-slider" min="10" max="45" value="15" step="0.5">
                <button class="btn btn-danger" id="delete-btn">🗑️ Supprimer</button>
            </div>
            
            <div class="panel">
                <h3>⛷️ Modules</h3>
                <div class="module-btn">Kicker S (Débutant)</div>
                <div class="module-btn">Kicker M (Intermédiaire)</div>
            </div>
        </div>

        <div class="main-workspace">
            <div id="altitude-box">Altitude: -- m</div>
            <div id="map-container"></div>
            <div id="profile-container">
                <button id="close-profile">❌</button>
                <canvas id="profileChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        proj4.defs("EPSG:2154", "+proj=lcc +lat_1=49 +lat_2=44 +lat_0=46.5 +lon_0=3 +x_0=700000 +y_0=6600000 +ellps=GRS80 +towgs84=0,0,0,0,0,0,0 +units=m +no_defs");

        let map; let activeModule = null; let selectedFeatureId = null;
        let isDragging = false; let draggedJustNow = false; let startCursorLngLat = null; let startBaseCoords = null;
        let mntData = null; let mntBboxL93 = null; let mntWidth = 0; let mntHeight = 0;
        let chartInstance = null; let currentChartParams = null;

        const hoverEl = document.createElement('div');
        hoverEl.style.width = '12px'; hoverEl.style.height = '12px'; hoverEl.style.backgroundColor = '#e74c3c';
        hoverEl.style.border = '2px solid white'; hoverEl.style.borderRadius = '50%';
        let hoverMarker = new maplibregl.Marker({element: hoverEl});

        // Marqueur de point de départ (Drop-in)
        const startEl = document.createElement('div');
        startEl.innerHTML = '🚩 START'; startEl.style.color = '#27ae60'; startEl.style.fontWeight = 'bold';
        startEl.style.fontSize = '12px'; startEl.style.textShadow = '0 0 3px white';
        let startMarker = new maplibregl.Marker({element: startEl});

        const moduleNorms = {
            'Kicker S (Débutant)': { width: 6, kickLen: 3, minKickAngle: 10, maxKickAngle: 25, defaultKickAngle: 15, defaultTable: 4, defaultLandLen: 8, color: '#2ecc71' },
            'Kicker M (Intermédiaire)': { width: 8, kickLen: 4, minKickAngle: 15, maxKickAngle: 35, defaultKickAngle: 25, defaultTable: 8, defaultLandLen: 12, color: '#f1c40f' }
        };

        let snowparkFeatures = { type: 'FeatureCollection', features: [] };
        let decorationsFeatures = { type: 'FeatureCollection', features: [] };

        function getBaseCenter(baseCoords) {
            const pts = baseCoords[0]; return { lng: (pts[0][0] + pts[2][0])/2, lat: (pts[0][1] + pts[2][1])/2 };
        }

        function calculatePolygonCoords(lngLat, widthM, lengthM) {
            const R = 6378137; const lat = lngLat.lat; const lng = lngLat.lng;
            const dLat = (lengthM / 2) / R; const dLng = (widthM / 2) / (R * Math.cos(Math.PI * lat / 180));
            return [[
                [lng - dLng * 180 / Math.PI, lat - dLat * 180 / Math.PI],
                [lng + dLng * 180 / Math.PI, lat - dLat * 180 / Math.PI],
                [lng + dLng * 180 / Math.PI, lat + dLat * 180 / Math.PI],
                [lng - dLng * 180 / Math.PI, lat + dLat * 180 / Math.PI],
                [lng - dLng * 180 / Math.PI, lat - dLat * 180 / Math.PI]
            ]];
        }

        function getAltitudeAt(lng, lat) {
            if (!mntData || !mntBboxL93) return null;
            const ptL93 = proj4("EPSG:4326", "EPSG:2154", [lng, lat]);
            const xL93 = ptL93[0]; const yL93 = ptL93[1];
            if (xL93 >= mntBboxL93[0] && xL93 <= mntBboxL93[2] && yL93 >= mntBboxL93[1] && yL93 <= mntBboxL93[3]) {
                const xF = ((xL93 - mntBboxL93[0]) / (mntBboxL93[2] - mntBboxL93[0])) * mntWidth;
                const yF = ((mntBboxL93[3] - yL93) / (mntBboxL93[3] - mntBboxL93[1])) * mntHeight;
                const x0 = Math.floor(xF); const x1 = Math.min(x0 + 1, mntWidth - 1);
                const y0 = Math.floor(yF); const y1 = Math.min(y0 + 1, mntHeight - 1);
                const tx = xF - x0; const ty = yF - y0;
                const alt00 = mntData[y0 * mntWidth + x0]; const alt10 = mntData[y0 * mntWidth + x1];
                const alt01 = mntData[y1 * mntWidth + x0]; const alt11 = mntData[y1 * mntWidth + x1];
                return (1 - tx) * (1 - ty) * alt00 + tx * (1 - ty) * alt10 + (1 - tx) * ty * alt01 + tx * ty * alt11;
            }
            return null;
        }

        // NOUVEAU : Met à jour les lignes de tous les modules pour qu'elles restent affichées
        function refreshAllDecorations() {
            decorationsFeatures.features = [];
            snowparkFeatures.features.forEach(feat => {
                const coords = feat.geometry.coordinates[0];
                const ptHaut = turf.point([(coords[3][0]+coords[2][0])/2, (coords[3][1]+coords[2][1])/2]);
                const ptBas = turf.point([(coords[0][0]+coords[1][0])/2, (coords[0][1]+coords[1][1])/2]);
                const bearing = turf.bearing(ptHaut, ptBas);
                const kickerLength = turf.distance(ptHaut, ptBas, {units: 'meters'});
                const amontPt = turf.destination(ptHaut, feat.properties.projectionDist, bearing - 180, {units: 'meters'});
                const totalDist = feat.properties.projectionDist * 2 + kickerLength;
                const avalPt = turf.destination(amontPt, totalDist, bearing, {units: 'meters'});

                // Axe Amont/Aval
                decorationsFeatures.features.push({ type: 'Feature', properties: { type: 'axis' }, geometry: { type: 'LineString', coordinates: [amontPt.geometry.coordinates, avalPt.geometry.coordinates] }});
                // Knoll/Zones
                const kL = feat.properties.kickLen; const tL = feat.properties.tableLen;
                [[kL, 'zone'], [kL+tL, 'zone']].forEach(z => {
                    const lA = turf.destination(turf.point(coords[3]), z[0], bearing, {units: 'meters'}).geometry.coordinates;
                    const lB = turf.destination(turf.point(coords[2]), z[0], bearing, {units: 'meters'}).geometry.coordinates;
                    decorationsFeatures.features.push({ type: 'Feature', properties: { type: z[1] }, geometry: { type: 'LineString', coordinates: [lA, lB] }});
                });
            });
            map.getSource('decorations-data').setData(decorationsFeatures);
        }

        function updateProfileChart(feat) {
            const coords = feat.geometry.coordinates[0];
            const ptHaut = turf.point([(coords[3][0]+coords[2][0])/2, (coords[3][1]+coords[2][1])/2]);
            const ptBas = turf.point([(coords[0][0]+coords[1][0])/2, (coords[0][1]+coords[1][1])/2]);
            const bearing = turf.bearing(ptHaut, ptBas);
            const kickerLength = turf.distance(ptHaut, ptBas, {units: 'meters'});
            const projDist = feat.properties.projectionDist;
            const kickAngle = feat.properties.kickAngle;
            const speedKmh = feat.properties.speed;
            const kickLen = feat.properties.kickLen;
            const tableLen = feat.properties.tableLen;
            const landLen = feat.properties.landLen;

            // Calcul du Drop-in (Vitesse -> Hauteur chute nécessaire)
            const vMps = speedKmh / 3.6;
            const hNeeded = (vMps * vMps) / (2 * 9.81 * 0.9); // 0.9 = Coeff frottement neige estimé
            let foundStart = null;
            let zStartKicker = getAltitudeAt(ptHaut.geometry.coordinates[0], ptHaut.geometry.coordinates[1]) || 0;

            // On remonte l'axe pour trouver le point de départ
            for(let d=1; d<200; d+=0.5) {
                const checkPt = turf.destination(ptHaut, d, bearing - 180, {units: 'meters'});
                const zCheck = getAltitudeAt(checkPt.geometry.coordinates[0], checkPt.geometry.coordinates[1]);
                if (zCheck && (zCheck - zStartKicker) >= hNeeded) {
                    foundStart = checkPt; break;
                }
            }
            if(foundStart) startMarker.setLngLat(foundStart.geometry.coordinates).addTo(map);
            else startMarker.remove();

            const amontPt = turf.destination(ptHaut, projDist, bearing - 180, {units: 'meters'});
            const totalDistance = projDist * 2 + kickerLength;
            const steps = 150;
            currentChartParams = { amontPt, bearing, totalDistance, steps };

            const labels = []; const terrainData = []; const kickerData = []; const trajData = [];
            const zKickEnd = zStartKicker + (kickLen * Math.tan(kickAngle * Math.PI / 180));
            const lipDist = projDist + kickLen;
            
            // Calcul Apex (Hauteur max vol)
            const v0 = vMps; const theta = kickAngle * Math.PI / 180; const g = 9.81;
            const hApexRel = (v0 * Math.sin(theta))**2 / (2 * g);
            const apexHeightStr = (hApexRel).toFixed(2);

            let hasLanded = false;
            for(let i=0; i<=steps; i++) {
                const fraction = i/steps; const curD = fraction * totalDistance;
                const ptX = turf.destination(amontPt, curD, bearing, {units: 'meters'});
                labels.push(curD.toFixed(1) + 'm');
                const zTerrain = getAltitudeAt(ptX.geometry.coordinates[0], ptX.geometry.coordinates[1]) || 0;
                terrainData.push(zTerrain);

                let zK = null;
                if (curD >= projDist && curD <= projDist + kickerLength) {
                    const d = curD - projDist;
                    if (d <= kickLen) zK = zStartKicker + (d * Math.tan(kickAngle * Math.PI / 180));
                    else if (d <= kickLen + tableLen) zK = zKickEnd;
                    else zK = zKickEnd - ((d - kickLen - tableLen) * Math.tan(feat.properties.landingAngle * Math.PI / 180));
                }
                kickerData.push(zK);

                if (curD >= lipDist && !hasLanded) {
                    const xRel = curD - lipDist; const t = xRel / (v0 * Math.cos(theta));
                    const zTraj = zKickEnd + (v0 * Math.sin(theta) * t) - (0.5 * g * t * t);
                    if (zTraj >= (zK || zTerrain)) trajData.push(zTraj);
                    else { trajData.push(zK || zTerrain); hasLanded = true; }
                } else trajData.push(null);
            }

            document.getElementById('profile-container').style.display = 'block'; map.resize();
            const ctx = document.getElementById('profileChart').getContext('2d');
            const chartTitle = `Profil - Hauteur max vol : ${apexHeightStr}m au dessus de la table`;

            if (chartInstance) {
                chartInstance.options.plugins.title.text = chartTitle;
                chartInstance.data.labels = labels; chartInstance.data.datasets[0].data = terrainData;
                chartInstance.data.datasets[1].data = kickerData; chartInstance.data.datasets[2].data = trajData;
                chartInstance.update();
            } else {
                chartInstance = new Chart(ctx, {
                    type: 'line',
                    data: { labels: labels, datasets: [
                        { label: 'Terrain', data: terrainData, borderColor: '#8e44ad', fill: true, pointRadius: 0, tension: 0.1 },
                        { label: 'Kicker', data: kickerData, borderColor: '#3498db', borderWidth: 4, pointRadius: 0, tension: 0 },
                        { label: 'Vol', data: trajData, borderColor: '#f39c12', borderDash: [5,5], pointRadius: 0, tension: 0.3 }
                    ]},
                    options: { 
                        responsive: true, maintainAspectRatio: false, animation: false,
                        plugins: { title: { display: true, text: chartTitle }, tooltip: { mode: 'index', intersect: false } },
                        scales: { y: { beginAtZero: false } },
                        onHover: (e, active) => {
                            if(active.length > 0 && currentChartParams) {
                                const pt = turf.destination(currentChartParams.amontPt, (active[0].index/currentChartParams.steps)*currentChartParams.totalDistance, currentChartParams.bearing, {units: 'meters'});
                                hoverMarker.setLngLat(pt.geometry.coordinates).addTo(map);
                            }
                        }
                    },
                    // Plugin pour la ligne verticale de survol
                    plugins: [{
                        afterDraw: chart => {
                            if (chart.tooltip?._active?.length) {
                                let x = chart.tooltip._active[0].element.x;
                                let yAxis = chart.scales.y;
                                let ctx = chart.ctx;
                                ctx.save(); ctx.beginPath(); ctx.setLineDash([3, 3]);
                                ctx.moveTo(x, yAxis.top); ctx.lineTo(x, yAxis.bottom);
                                ctx.lineWidth = 1; ctx.strokeStyle = '#2c3e50'; ctx.stroke(); ctx.restore();
                            }
                        }
                    }]
                });
            }
            refreshAllDecorations();
        }

        // --- EVENTS & MAP ---
        document.addEventListener('DOMContentLoaded', () => {
            map = new maplibregl.Map({ 
                container: 'map-container', 
                style: { 'version': 8, 'sources': { 's': { 'type': 'raster', 'tiles': ['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'], 'tileSize': 256 } }, 'layers': [{ 'id': 's', 'type': 'raster', 'source': 's' }] }, 
                center: [0.5936, 42.7610], zoom: 14 
            });

            map.on('load', () => {
                map.addSource('snowpark-data', { type: 'geojson', data: snowparkFeatures });
                map.addLayer({ id: 'f', type: 'fill', source: 'snowpark-data', paint: { 'fill-color': ['get', 'color'], 'fill-opacity': 0.5 } });
                map.addLayer({ id: 'o', type: 'line', source: 'snowpark-data', paint: { 'line-color': ['case', ['boolean', ['feature-state', 'selected'], false], '#e74c3c', '#fff'], 'line-width': 2 } });
                map.addSource('decorations-data', { type: 'geojson', data: decorationsFeatures });
                map.addLayer({ id: 'al', type: 'line', source: 'decorations-data', filter: ['==', 'type', 'axis'], paint: { 'line-color': '#f39c12', 'line-width': 2, 'line-dasharray': [2, 2] } });
                map.addLayer({ id: 'zl', type: 'line', source: 'decorations-data', filter: ['==', 'type', 'zone'], paint: { 'line-color': '#fff', 'line-width': 1, 'line-dasharray': [4, 4] } });
            });

            document.getElementById('mnt-upload').addEventListener('change', async (e) => {
                const tiff = await GeoTIFF.fromBlob(e.target.files[0]); const img = await tiff.getImage();
                mntBboxL93 = img.getBoundingBox(); mntWidth = img.getWidth(); mntHeight = img.getHeight();
                mntData = (await img.readRasters())[0];
                const bl = proj4("EPSG:2154", "EPSG:4326", [mntBboxL93[0], mntBboxL93[1]]);
                const tr = proj4("EPSG:2154", "EPSG:4326", [mntBboxL93[2], mntBboxL93[3]]);
                map.fitBounds([bl, tr], { padding: 40 });
            });

            map.on('mousemove', (e) => {
                const alt = getAltitudeAt(e.lngLat.lng, e.lngLat.lat);
                document.getElementById('altitude-box').innerText = alt ? `Altitude: ${alt.toFixed(2)} m` : "--";
            });

            map.on('mousedown', 'f', (e) => {
                isDragging = true; map.dragPan.disable(); startCursorLngLat = e.lngLat;
                selectFeature(e.features[0].properties.id);
                startBaseCoords = JSON.parse(snowparkFeatures.features.find(f => f.properties.id === selectedFeatureId).properties.baseCoords);
            });

            map.on('mousemove', (e) => {
                if (!isDragging || !selectedFeatureId) return;
                const feat = snowparkFeatures.features.find(f => f.properties.id === selectedFeatureId);
                const nbc = startBaseCoords[0].map(c => [c[0] + (e.lngLat.lng - startCursorLngLat.lng), c[1] + (e.lngLat.lat - startCursorLngLat.lat)]);
                feat.properties.baseCoords = JSON.stringify([nbc]);
                feat.geometry.coordinates = turf.transformRotate(turf.polygon([nbc]), feat.properties.rotation).geometry.coordinates;
                map.getSource('snowpark-data').setData(snowparkFeatures); updateProfileChart(feat);
            });

            map.on('mouseup', () => { if(isDragging){ isDragging=false; draggedJustNow=true; setTimeout(()=>draggedJustNow=false,100); map.dragPan.enable(); }});

            const mods = document.querySelectorAll('.module-btn');
            mods.forEach(m => m.addEventListener('click', (e) => {
                activeModule = (activeModule === e.target.innerText) ? null : e.target.innerText;
                mods.forEach(b => b.style.border = (activeModule === b.innerText) ? '3px solid #2ecc71' : 'none');
                map.getCanvas().style.cursor = activeModule ? 'crosshair' : '';
            }));

            map.on('click', (e) => {
                if (draggedJustNow) return;
                if (activeModule) {
                    const n = moduleNorms[activeModule]; const id = Date.now();
                    const c = calculatePolygonCoords(e.lngLat, n.width, n.kickLen + n.defaultTable + n.defaultLandLen);
                    const nf = { id, type: 'Feature', properties: { id, name: activeModule, color: n.color, rotation: 0, projectionDist: 50, speed: 40, kickLen: n.kickLen, tableLen: n.defaultTable, landLen: n.defaultLandLen, kickAngle: n.defaultKickAngle, landingAngle: 25, baseCoords: JSON.stringify(c) }, geometry: { type: 'Polygon', coordinates: c } };
                    snowparkFeatures.features.push(nf); map.getSource('snowpark-data').setData(snowparkFeatures);
                    selectFeature(id); activeModule = null; mods.forEach(b => b.style.border = 'none');
                } else if (!map.queryRenderedFeatures(e.point, { layers: ['f'] }).length) deselectFeature();
            });

            function selectFeature(id) {
                if(selectedFeatureId) map.setFeatureState({ source: 'snowpark-data', id: selectedFeatureId }, { selected: false });
                selectedFeatureId = id; map.setFeatureState({ source: 'snowpark-data', id: selectedFeatureId }, { selected: true });
                const f = snowparkFeatures.features.find(x => x.properties.id === id);
                document.getElementById('edit-panel').style.display = 'block';
                document.getElementById('edit-name').innerText = f.properties.name;
                ['rotation', 'speed', 'table', 'landlen', 'kick'].forEach(p => {
                    let sid = (p==='table'?'table-slider':p==='landlen'?'landlen-slider':p+'-slider');
                    let val = (p==='table'?f.properties.tableLen:p==='landlen'?f.properties.landLen:f.properties[p+(p==='kick'?'Angle':'')]);
                    document.getElementById(sid).value = val; document.getElementById(p+'-display').innerText = val;
                });
                updateProfileChart(f);
            }

            function deselectFeature() {
                if(selectedFeatureId) map.setFeatureState({ source: 'snowpark-data', id: selectedFeatureId }, { selected: false });
                selectedFeatureId = null; document.getElementById('edit-panel').style.display = 'none';
                document.getElementById('profile-container').style.display = 'none'; startMarker.remove();
            }

            function sync(prop, slider, disp, isGeom) {
                document.getElementById(slider).addEventListener('input', (e) => {
                    if(!selectedFeatureId) return;
                    const v = parseFloat(e.target.value); document.getElementById(disp).innerText = v;
                    const f = snowparkFeatures.features.find(x => x.properties.id === selectedFeatureId);
                    if(prop==='kickAngle') f.properties.kickAngle = v;
                    else if(prop==='speed') f.properties.speed = v;
                    else if(prop==='rotation') {
                        f.properties.rotation = v;
                        f.geometry.coordinates = turf.transformRotate(turf.polygon(JSON.parse(f.properties.baseCoords)), v).geometry.coordinates;
                    } else {
                        f.properties[prop] = v;
                        const n = moduleNorms[f.properties.name];
                        const nc = calculatePolygonCoords(getBaseCenter(JSON.parse(f.properties.baseCoords)), n.width, f.properties.kickLen + f.properties.tableLen + f.properties.landLen);
                        f.properties.baseCoords = JSON.stringify(nf); f.geometry.coordinates = turf.transformRotate(turf.polygon(nc), f.properties.rotation).geometry.coordinates;
                    }
                    map.getSource('snowpark-data').setData(snowparkFeatures); updateProfileChart(f);
                });
            }
            sync('rotation', 'rotation-slider', 'angle-display'); sync('speed', 'speed-slider', 'speed-display');
            sync('tableLen', 'table-slider', 'table-display'); sync('landLen', 'landlen-slider', 'landlen-display');
            sync('kickAngle', 'kick-slider', 'kick-display');

            document.getElementById('delete-btn').addEventListener('click', () => {
                snowparkFeatures.features = snowparkFeatures.features.filter(x => x.properties.id !== selectedFeatureId);
                map.getSource('snowpark-data').setData(snowparkFeatures); deselectFeature(); refreshAllDecorations();
            });
            document.getElementById('close-profile').addEventListener('click', deselectFeature);
        });
    </script>
</body>
</html>
