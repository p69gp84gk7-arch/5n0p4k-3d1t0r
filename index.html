<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snowpark Designer Pro</title>
    
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/geotiff@2.1.3/dist-browser/geotiff.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; color: #333; overflow: hidden; }
        .app-container { display: flex; height: 100vh; width: 100vw; }
        .sidebar { width: 340px; background-color: #2c3e50; color: #ecf0f1; padding: 20px; box-sizing: border-box; overflow-y: auto; z-index: 10; box-shadow: 2px 0 5px rgba(0,0,0,0.2); }
        .sidebar h2 { margin-top: 0; font-size: 1.5rem; border-bottom: 1px solid #34495e; padding-bottom: 15px; }
        .panel { background-color: #34495e; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .panel h3 { margin-top: 0; font-size: 1.1rem; color: #3498db; }
        .btn { width: 100%; padding: 10px; margin-bottom: 10px; border: none; border-radius: 5px; background-color: #7f8c8d; color: white; cursor: pointer; font-weight: bold; }
        .btn-primary { background-color: #27ae60; }
        .btn-danger { background-color: #e74c3c; margin-top: 15px; }
        .module-btn { background-color: #e67e22; padding: 10px; margin-bottom: 8px; text-align: center; border-radius: 4px; cursor: pointer; font-weight: bold; transition: all 0.2s; }
        .main-workspace { flex-grow: 1; position: relative; display: flex; flex-direction: column; }
        #map-container { flex-grow: 1; position: relative; background-color: #2c3e50; } 
        
        #profile-container { height: 350px; background: white; border-top: 3px solid #34495e; padding: 10px; box-sizing: border-box; display: none; position: relative; }
        #close-profile { position: absolute; top: 5px; right: 10px; background: none; border: none; font-size: 1.2rem; cursor: pointer; }
        
        #altitude-box { position: absolute; top: 20px; left: 20px; background-color: rgba(44, 62, 80, 0.9); color: #2ecc71; padding: 10px 20px; border-radius: 5px; font-size: 1.2rem; font-weight: bold; z-index: 20; box-shadow: 0 4px 6px rgba(0,0,0,0.5); border: 2px solid #34495e; }
        
        input[type=range] { width: 100%; margin-top: 2px; margin-bottom: 8px; cursor: pointer; }
        label { font-size: 0.8rem; color: #ecf0f1; display: block; margin-top: 5px; }
        .slider-val { font-weight: bold; color: #f1c40f; }
        hr { border: 0; height: 1px; background: #2c3e50; margin: 10px 0; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="sidebar">
            <h2>🛠️ Snowpark Pro v18</h2>
            <div class="panel"><button class="btn btn-primary">Enregistrer</button></div>
            <div class="panel">
                <h3>🗺️ Topographie (MNT)</h3>
                <input type="file" id="mnt-upload" accept=".tif,.tiff">
            </div>
            
            <div class="panel" id="edit-panel" style="display: none; border: 2px solid #3498db;">
                <h3>⚙️ Édition du Module</h3>
                <p id="edit-name" style="font-weight: bold; color: #e67e22; margin-top: 0;"></p>
                
                <label>Rotation (<span class="slider-val" id="angle-display">0</span>°)</label>
                <input type="range" id="rotation-slider" min="0" max="360" value="0">
                <hr>
                <label>Long. Table/Knoll (<span class="slider-val" id="table-display">4</span> m)</label>
                <input type="range" id="table-slider" min="0" max="25" value="4" step="0.5">
                
                <label>Long. Réception (<span class="slider-val" id="landlen-display">8</span> m)</label>
                <input type="range" id="landlen-slider" min="2" max="30" value="8" step="0.5">
                <hr>
                <label>Angle du Kick (<span class="slider-val" id="kick-display">15</span>°)</label>
                <input type="range" id="kick-slider" min="10" max="20" value="15" step="0.5">
                
                <label>Angle Réception (<span class="slider-val" id="land-display">25</span>°)</label>
                <input type="range" id="land-slider" min="5" max="45" value="25" step="0.5">
                <hr>
                <label>Vitesse du rider (<span class="slider-val" id="speed-display">50</span> km/h)</label>
                <input type="range" id="speed-slider" min="20" max="100" value="50">
                
                <label>Vue Amont/Aval (<span class="slider-val" id="proj-display">40</span> m)</label>
                <input type="range" id="proj-slider" min="10" max="100" value="40">
                
                <button class="btn btn-danger" id="delete-btn">🗑️ Supprimer</button>
            </div>
            
            <div class="panel">
                <h3>⛷️ Modules (Norme AFNOR/FIS)</h3>
                <div class="module-btn">Kicker S (Débutant)</div>
                <div class="module-btn">Kicker M (Intermédiaire)</div>
            </div>
        </div>

        <div class="main-workspace">
            <div id="altitude-box">Altitude: -- m</div>
            <div id="map-container"></div>
            
            <div id="profile-container">
                <button id="close-profile">❌</button>
                <canvas id="profileChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        proj4.defs("EPSG:2154", "+proj=lcc +lat_1=49 +lat_2=44 +lat_0=46.5 +lon_0=3 +x_0=700000 +y_0=6600000 +ellps=GRS80 +towgs84=0,0,0,0,0,0,0 +units=m +no_defs");

        let map; let activeModule = null; let selectedFeatureId = null;
        let isDragging = false; let draggedJustNow = false; let startCursorLngLat = null; let startBaseCoords = null;
        let mntData = null; let mntBboxL93 = null; let mntWidth = 0; let mntHeight = 0;
        let chartInstance = null;

        // NOUVEAU : Mémoire des données du graphique pour faire le lien avec le curseur
        let currentChartParams = null;
        // Création du pointeur rouge qui se baladera sur la carte
        const hoverEl = document.createElement('div');
        hoverEl.style.width = '14px'; hoverEl.style.height = '14px';
        hoverEl.style.backgroundColor = '#e74c3c';
        hoverEl.style.border = '2px solid white';
        hoverEl.style.borderRadius = '50%';
        hoverEl.style.boxShadow = '0 0 5px rgba(0,0,0,0.8)';
        let hoverMarker = new maplibregl.Marker({element: hoverEl});

        const moduleNorms = {
            'Kicker S (Débutant)': { width: 6, kickLen: 3, minKickAngle: 10, maxKickAngle: 20, defaultKickAngle: 15, defaultTable: 4, defaultLandLen: 8, color: '#2ecc71' },
            'Kicker M (Intermédiaire)': { width: 8, kickLen: 4, minKickAngle: 20, maxKickAngle: 30, defaultKickAngle: 25, defaultTable: 8, defaultLandLen: 12, color: '#f1c40f' }
        };

        let snowparkFeatures = { type: 'FeatureCollection', features: [] };
        // Base de données pour les lignes (Axe et Zones)
        let decorationsFeatures = { type: 'FeatureCollection', features: [] };

        function getBaseCenter(baseCoords) {
            const pts = baseCoords[0]; return { lng: (pts[0][0] + pts[2][0])/2, lat: (pts[0][1] + pts[2][1])/2 };
        }

        function calculatePolygonCoords(lngLat, widthM, lengthM) {
            const R = 6378137; const lat = lngLat.lat; const lng = lngLat.lng;
            const dLat = (lengthM / 2) / R; const dLng = (widthM / 2) / (R * Math.cos(Math.PI * lat / 180));
            return [[
                [lng - dLng * 180 / Math.PI, lat - dLat * 180 / Math.PI],
                [lng + dLng * 180 / Math.PI, lat - dLat * 180 / Math.PI],
                [lng + dLng * 180 / Math.PI, lat + dLat * 180 / Math.PI],
                [lng - dLng * 180 / Math.PI, lat + dLat * 180 / Math.PI],
                [lng - dLng * 180 / Math.PI, lat - dLat * 180 / Math.PI]
            ]];
        }

        function getAltitudeAt(lng, lat) {
            if (!mntData || !mntBboxL93) return null;
            const ptL93 = proj4("EPSG:4326", "EPSG:2154", [lng, lat]);
            const xL93 = ptL93[0]; const yL93 = ptL93[1];
            if (xL93 >= mntBboxL93[0] && xL93 <= mntBboxL93[2] && yL93 >= mntBboxL93[1] && yL93 <= mntBboxL93[3]) {
                const xF = ((xL93 - mntBboxL93[0]) / (mntBboxL93[2] - mntBboxL93[0])) * mntWidth;
                const yF = ((mntBboxL93[3] - yL93) / (mntBboxL93[3] - mntBboxL93[1])) * mntHeight;
                const x0 = Math.floor(xF); const x1 = Math.min(x0 + 1, mntWidth - 1);
                const y0 = Math.floor(yF); const y1 = Math.min(y0 + 1, mntHeight - 1);
                const tx = xF - x0; const ty = yF - y0;
                const alt00 = mntData[y0 * mntWidth + x0]; const alt10 = mntData[y0 * mntWidth + x1];
                const alt01 = mntData[y1 * mntWidth + x0]; const alt11 = mntData[y1 * mntWidth + x1];
                if (alt00 < -100 || alt10 < -100 || alt01 < -100 || alt11 < -100) return null;
                if (alt00 > 8848) return null;
                return (1 - tx) * (1 - ty) * alt00 + tx * (1 - ty) * alt10 + (1 - tx) * ty * alt01 + tx * ty * alt11;
            }
            return null;
        }

        function updateProfileChart(feat) {
            const coords = feat.geometry.coordinates[0];
            const ptHaut = turf.point([(coords[3][0]+coords[2][0])/2, (coords[3][1]+coords[2][1])/2]);
            const ptBas = turf.point([(coords[0][0]+coords[1][0])/2, (coords[0][1]+coords[1][1])/2]);
            const bearing = turf.bearing(ptHaut, ptBas);
            
            const kickerLength = turf.distance(ptHaut, ptBas, {units: 'meters'});
            const projDist = feat.properties.projectionDist;
            const kickAngle = feat.properties.kickAngle;
            const landingAngle = feat.properties.landingAngle;
            const speedKmh = feat.properties.speed;

            const kickLen = feat.properties.kickLen;
            const tableLen = feat.properties.tableLen;

            const amontPt = turf.destination(ptHaut, projDist, bearing - 180, {units: 'meters'});
            const totalDistance = projDist * 2 + kickerLength;
            
            // --- DESSIN DES LIGNES SUR LA CARTE (Axe + Zones) ---
            decorationsFeatures.features = [];
            
            // Ligne d'axe principale
            const avalPt = turf.destination(amontPt, totalDistance, bearing, {units: 'meters'});
            decorationsFeatures.features.push({ type: 'Feature', properties: { type: 'axis' }, geometry: { type: 'LineString', coordinates: [amontPt.geometry.coordinates, avalPt.geometry.coordinates] }});

            // Ligne de séparation 1 (Fin du Kick)
            const l1_left = turf.destination(turf.point(coords[3]), kickLen, bearing, {units: 'meters'}).geometry.coordinates;
            const l1_right = turf.destination(turf.point(coords[2]), kickLen, bearing, {units: 'meters'}).geometry.coordinates;
            decorationsFeatures.features.push({ type: 'Feature', properties: { type: 'zone' }, geometry: { type: 'LineString', coordinates: [l1_left, l1_right] }});

            // Ligne de séparation 2 (Fin de la Table / Début Réception)
            const l2_left = turf.destination(turf.point(coords[3]), kickLen + tableLen, bearing, {units: 'meters'}).geometry.coordinates;
            const l2_right = turf.destination(turf.point(coords[2]), kickLen + tableLen, bearing, {units: 'meters'}).geometry.coordinates;
            decorationsFeatures.features.push({ type: 'Feature', properties: { type: 'zone' }, geometry: { type: 'LineString', coordinates: [l2_left, l2_right] }});

            map.getSource('decorations-data').setData(decorationsFeatures);
            // -----------------------------------------------------

            const stepResolution = 0.2; 
            const steps = Math.min(Math.ceil(totalDistance / stepResolution), 600); 
            
            // On mémorise les paramètres pour le Hover
            currentChartParams = { amontPt, bearing, totalDistance, steps };

            const labels = []; const terrainData = []; const kickerData = []; const trajData = [];
            let zStartKicker = getAltitudeAt(ptHaut.geometry.coordinates[0], ptHaut.geometry.coordinates[1]) || 0;
            const zKickEnd = zStartKicker + (kickLen * Math.tan(kickAngle * Math.PI / 180));
            const lipDistance = projDist + kickLen; 

            const v0 = speedKmh / 3.6; 
            const theta = kickAngle * Math.PI / 180; 
            const g = 9.81; 
            let hasLanded = false;

            for(let i=0; i<=steps; i++) {
                const fraction = i/steps;
                const currentDist = fraction * totalDistance;
                const ptX = turf.destination(amontPt, currentDist, bearing, {units: 'meters'});
                
                labels.push(currentDist.toFixed(2) + 'm'); 
                
                const alt = getAltitudeAt(ptX.geometry.coordinates[0], ptX.geometry.coordinates[1]);
                const zTerrain = alt !== null ? alt : 0;
                terrainData.push(zTerrain);

                let zKickerCalc = null;
                if (currentDist >= projDist && currentDist <= projDist + kickerLength) {
                    const d = currentDist - projDist;
                    if (d <= kickLen) zKickerCalc = zStartKicker + (d * Math.tan(kickAngle * Math.PI / 180));
                    else if (d <= kickLen + tableLen) zKickerCalc = zKickEnd;
                    else zKickerCalc = zKickEnd - ((d - kickLen - tableLen) * Math.tan(landingAngle * Math.PI / 180));
                    kickerData.push(zKickerCalc);
                } else {
                    kickerData.push(null);
                }

                if (currentDist < lipDistance) {
                    trajData.push(null); 
                } else if (!hasLanded) {
                    const xRel = currentDist - lipDistance; 
                    const t = xRel / (v0 * Math.cos(theta)); 
                    const zTraj = zKickEnd + (v0 * Math.sin(theta) * t) - (0.5 * g * t * t);
                    const surfaceZ = zKickerCalc !== null ? zKickerCalc : zTerrain;
                    
                    if (zTraj >= surfaceZ) trajData.push(zTraj);
                    else { trajData.push(surfaceZ); hasLanded = true; }
                } else {
                    trajData.push(null); 
                }
            }

            document.getElementById('profile-container').style.display = 'block'; map.resize();
            const ctx = document.getElementById('profileChart').getContext('2d');

            if (chartInstance) {
                chartInstance.data.labels = labels;
                chartInstance.data.datasets[0].data = terrainData;
                chartInstance.data.datasets[1].data = kickerData;
                chartInstance.data.datasets[2].data = trajData; 
                chartInstance.update();
            } else {
                chartInstance = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [
                            { label: 'MNT', data: terrainData, borderColor: '#8e44ad', backgroundColor: 'rgba(142, 68, 173, 0.2)', fill: true, tension: 0.1, pointRadius: 0 },
                            { label: 'Neige', data: kickerData, borderColor: '#3498db', backgroundColor: 'rgba(52, 152, 219, 0.4)', fill: false, tension: 0, pointRadius: 0, borderWidth: 4, borderJoinStyle: 'round' },
                            { label: 'Vol', data: trajData, borderColor: '#e67e22', borderDash: [5, 5], fill: false, tension: 0.2, pointRadius: 0, borderWidth: 3 }
                        ]
                    },
                    options: { 
                        responsive: true, maintainAspectRatio: false, animation: false, 
                        scales: { y: { title: { display: true, text: 'Altitude (m)' } }, x: { title: { display: true, text: 'Distance (m)' }, ticks: { maxTicksLimit: 15 } } },
                        interaction: { intersect: false, mode: 'index' },
                        // NOUVEAU : On gère le survol de la souris pour bouger le point sur la carte !
                        onHover: (event, activeElements) => {
                            if (activeElements.length > 0 && currentChartParams) {
                                const index = activeElements[0].index;
                                const fraction = index / currentChartParams.steps;
                                const dist = fraction * currentChartParams.totalDistance;
                                const hoverPt = turf.destination(currentChartParams.amontPt, dist, currentChartParams.bearing, {units: 'meters'});
                                hoverMarker.setLngLat(hoverPt.geometry.coordinates).addTo(map);
                            } else {
                                hoverMarker.remove();
                            }
                        }
                    }
                });
            }
        }

        function updateGeometryFromSliders(feat) {
            const norm = moduleNorms[feat.properties.name];
            const newTotalLen = feat.properties.kickLen + feat.properties.tableLen + feat.properties.landLen;
            const centerLngLat = getBaseCenter(JSON.parse(feat.properties.baseCoords));
            const newCoords = calculatePolygonCoords(centerLngLat, norm.width, newTotalLen);
            feat.properties.baseCoords = JSON.stringify(newCoords);
            const basePoly = turf.polygon(newCoords);
            const rotatedPoly = turf.transformRotate(basePoly, feat.properties.rotation);
            feat.geometry.coordinates = rotatedPoly.geometry.coordinates;
            map.getSource('snowpark-data').setData(snowparkFeatures);
            updateProfileChart(feat);
        }

        document.getElementById('close-profile').addEventListener('click', () => {
            document.getElementById('profile-container').style.display = 'none'; deselectCurrentFeature(); map.resize();
        });

        document.addEventListener('DOMContentLoaded', () => {
            
            map = new maplibregl.Map({ 
                container: 'map-container', 
                style: { 'version': 8, 'sources': { 'esri-sat': { 'type': 'raster', 'tiles': ['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'], 'tileSize': 256 } }, 'layers': [{ 'id': 'sat-layer', 'type': 'raster', 'source': 'esri-sat' }] }, 
                center: [0.5936, 42.7610], zoom: 14 
            });
            map.addControl(new maplibregl.NavigationControl(), 'top-right');

            map.on('load', () => {
                map.addSource('snowpark-data', { type: 'geojson', data: snowparkFeatures });
                map.addLayer({ id: 'modules-fill', type: 'fill', source: 'snowpark-data', paint: { 'fill-color': ['get', 'color'], 'fill-opacity': 0.5 } });
                map.addLayer({ id: 'modules-outline', type: 'line', source: 'snowpark-data', paint: { 'line-color': ['case', ['boolean', ['feature-state', 'selected'], false], '#e74c3c', '#ffffff'], 'line-width': ['case', ['boolean', ['feature-state', 'selected'], false], 4, 2] } });
                
                // NOUVELLES COUCHES : L'axe et les zones
                map.addSource('decorations-data', { type: 'geojson', data: decorationsFeatures });
                map.addLayer({ id: 'axis-layer', type: 'line', source: 'decorations-data', filter: ['==', 'type', 'axis'], paint: { 'line-color': '#f39c12', 'line-width': 3, 'line-dasharray': [3, 3] } });
                map.addLayer({ id: 'zone-layer', type: 'line', source: 'decorations-data', filter: ['==', 'type', 'zone'], paint: { 'line-color': '#ffffff', 'line-width': 2, 'line-dasharray': [2, 2] } });

                map.addSource('mnt-bounds', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
                map.addLayer({ id: 'mnt-bounds-line', type: 'line', source: 'mnt-bounds', paint: { 'line-color': '#e74c3c', 'line-width': 3, 'line-dasharray': [2, 2] } });
            });

            document.getElementById('mnt-upload').addEventListener('change', async (e) => {
                const file = e.target.files[0]; if (!file) return;
                document.getElementById('altitude-box').innerText = "Chargement...";
                try {
                    const tiff = await GeoTIFF.fromBlob(file); const image = await tiff.getImage();
                    mntBboxL93 = image.getBoundingBox(); mntWidth = image.getWidth(); mntHeight = image.getHeight();
                    const rasters = await image.readRasters(); mntData = rasters[0];
                    const bl = proj4("EPSG:2154", "EPSG:4326", [mntBboxL93[0], mntBboxL93[1]]); const br = proj4("EPSG:2154", "EPSG:4326", [mntBboxL93[2], mntBboxL93[1]]);
                    const tr = proj4("EPSG:2154", "EPSG:4326", [mntBboxL93[2], mntBboxL93[3]]); const tl = proj4("EPSG:2154", "EPSG:4326", [mntBboxL93[0], mntBboxL93[3]]);
                    map.getSource('mnt-bounds').setData({ type: 'Feature', geometry: { type: 'Polygon', coordinates: [[bl, br, tr, tl, bl]] } });
                    map.fitBounds([bl, tr], { padding: 40 });
                    document.getElementById('altitude-box').innerText = "Survolez la zone rouge";
                    if(selectedFeatureId) updateProfileChart(snowparkFeatures.features.find(f => f.properties.id === selectedFeatureId));
                } catch (err) { console.error(err); alert("Erreur MNT"); }
            });

            map.on('mousemove', (e) => {
                const alt = getAltitudeAt(e.lngLat.lng, e.lngLat.lat);
                if (alt !== null) document.getElementById('altitude-box').innerText = `Altitude: ${alt.toFixed(2)} m`;
                else if (mntData) document.getElementById('altitude-box').innerText = "Hors zone MNT";
            });

            map.on('mousedown', 'modules-fill', (e) => {
                if (activeModule) return; e.preventDefault(); isDragging = true; map.dragPan.disable();
                startCursorLngLat = e.lngLat; selectFeature(e.features[0].properties.id);
                startBaseCoords = JSON.parse(snowparkFeatures.features.find(f => f.properties.id === selectedFeatureId).properties.baseCoords);
            });

            map.on('mousemove', (e) => {
                if (!isDragging || !selectedFeatureId) return;
                const lngOffset = e.lngLat.lng - startCursorLngLat.lng; const latOffset = e.lngLat.lat - startCursorLngLat.lat;
                const feat = snowparkFeatures.features.find(f => f.properties.id === selectedFeatureId);
                const newBaseCoords = startBaseCoords[0].map(coord => [coord[0] + lngOffset, coord[1] + latOffset]);
                feat.properties.baseCoords = JSON.stringify([newBaseCoords]);
                const basePoly = turf.polygon([newBaseCoords]);
                const rotatedPoly = turf.transformRotate(basePoly, feat.properties.rotation);
                feat.geometry.coordinates = rotatedPoly.geometry.coordinates;
                map.getSource('snowpark-data').setData(snowparkFeatures);
                updateProfileChart(feat); 
            });

            map.on('mouseup', () => { if (isDragging) { isDragging = false; draggedJustNow = true; setTimeout(() => draggedJustNow = false, 100); map.dragPan.enable(); } });

            const modules = document.querySelectorAll('.module-btn');
            modules.forEach(mod => {
                mod.addEventListener('click', (e) => {
                    deselectCurrentFeature(); modules.forEach(m => m.style.border = 'none');
                    if (activeModule === e.target.innerText) { activeModule = null; if(map) map.getCanvas().style.cursor = ''; } 
                    else { activeModule = e.target.innerText; e.target.style.border = '3px solid #2ecc71'; if(map) map.getCanvas().style.cursor = 'crosshair'; }
                });
            });

            map.on('click', (e) => {
                if (draggedJustNow) return;
                if (activeModule) {
                    const norm = moduleNorms[activeModule];
                    if (!norm) return; 

                    const totalInitLen = norm.kickLen + norm.defaultTable + norm.defaultLandLen;
                    const coords = calculatePolygonCoords(e.lngLat, norm.width, totalInitLen); 
                    const uniqueId = Date.now();
                    
                    const newFeature = { 
                        id: uniqueId, type: 'Feature', 
                        properties: { 
                            id: uniqueId, name: activeModule, color: norm.color, rotation: 0, 
                            projectionDist: 40, speed: 50,
                            kickLen: norm.kickLen, tableLen: norm.defaultTable, landLen: norm.defaultLandLen,
                            kickAngle: norm.defaultKickAngle, landingAngle: 25, 
                            baseCoords: JSON.stringify(coords) 
                        }, 
                        geometry: { type: 'Polygon', coordinates: coords } 
                    };
                    snowparkFeatures.features.push(newFeature); map.getSource('snowpark-data').setData(snowparkFeatures);
                    selectFeature(uniqueId); activeModule = null; modules.forEach(m => m.style.border = 'none'); map.getCanvas().style.cursor = '';
                    return;
                }
                if (map.queryRenderedFeatures(e.point, { layers: ['modules-fill'] }).length === 0) deselectCurrentFeature();
            });

            function selectFeature(id) {
                deselectCurrentFeature(); selectedFeatureId = id; map.setFeatureState({ source: 'snowpark-data', id: selectedFeatureId }, { selected: true });
                const feat = snowparkFeatures.features.find(f => f.properties.id === selectedFeatureId);
                const norm = moduleNorms[feat.properties.name];

                document.getElementById('edit-panel').style.display = 'block';
                document.getElementById('edit-name').innerText = feat.properties.name;
                
                document.getElementById('kick-slider').min = norm.minKickAngle;
                document.getElementById('kick-slider').max = norm.maxKickAngle;

                document.getElementById('rotation-slider').value = feat.properties.rotation; document.getElementById('angle-display').innerText = feat.properties.rotation;
                document.getElementById('speed-slider').value = feat.properties.speed; document.getElementById('speed-display').innerText = feat.properties.speed;
                document.getElementById('proj-slider').value = feat.properties.projectionDist; document.getElementById('proj-display').innerText = feat.properties.projectionDist;
                
                document.getElementById('table-slider').value = feat.properties.tableLen; document.getElementById('table-display').innerText = feat.properties.tableLen;
                document.getElementById('landlen-slider').value = feat.properties.landLen; document.getElementById('landlen-display').innerText = feat.properties.landLen;
                
                document.getElementById('kick-slider').value = feat.properties.kickAngle; document.getElementById('kick-display').innerText = feat.properties.kickAngle;
                document.getElementById('land-slider').value = feat.properties.landingAngle; document.getElementById('land-display').innerText = feat.properties.landingAngle;
                
                updateProfileChart(feat);
            }

            function deselectCurrentFeature() {
                if (selectedFeatureId) { 
                    map.setFeatureState({ source: 'snowpark-data', id: selectedFeatureId }, { selected: false }); 
                    selectedFeatureId = null; 
                    document.getElementById('edit-panel').style.display = 'none'; 
                    document.getElementById('profile-container').style.display = 'none'; 
                    
                    // NOUVEAU : Effacer les décorations et le pointeur quand on désélectionne
                    decorationsFeatures.features = [];
                    map.getSource('decorations-data').setData(decorationsFeatures);
                    hoverMarker.remove();
                    
                    map.resize(); 
                }
            }

            function updateFeatProp(propName, sliderId, displayId) {
                document.getElementById(sliderId).addEventListener('input', (e) => {
                    if (selectedFeatureId) {
                        const val = parseFloat(e.target.value); document.getElementById(displayId).innerText = val;
                        const feat = snowparkFeatures.features.find(f => f.properties.id === selectedFeatureId);
                        feat.properties[propName] = val;
                        
                        if(propName === 'rotation') {
                            const basePoly = turf.polygon(JSON.parse(feat.properties.baseCoords)); const rotatedPoly = turf.transformRotate(basePoly, val);
                            feat.geometry.coordinates = rotatedPoly.geometry.coordinates; map.getSource('snowpark-data').setData(snowparkFeatures);
                        }
                        updateProfileChart(feat);
                    }
                });
            }

            updateFeatProp('rotation', 'rotation-slider', 'angle-display');
            updateFeatProp('speed', 'speed-slider', 'speed-display');
            updateFeatProp('projectionDist', 'proj-slider', 'proj-display');
            updateFeatProp('kickAngle', 'kick-slider', 'kick-display');
            updateFeatProp('landingAngle', 'land-slider', 'land-display');

            function updateLengthProp(propName, sliderId, displayId) {
                document.getElementById(sliderId).addEventListener('input', (e) => {
                    if (selectedFeatureId) {
                        const val = parseFloat(e.target.value); document.getElementById(displayId).innerText = val;
                        const feat = snowparkFeatures.features.find(f => f.properties.id === selectedFeatureId);
                        feat.properties[propName] = val;
                        updateGeometryFromSliders(feat);
                    }
                });
            }
            
            updateLengthProp('tableLen', 'table-slider', 'table-display');
            updateLengthProp('landLen', 'landlen-slider', 'landlen-display');

            document.getElementById('delete-btn').addEventListener('click', () => {
                if (selectedFeatureId) { snowparkFeatures.features = snowparkFeatures.features.filter(f => f.properties.id !== selectedFeatureId); map.getSource('snowpark-data').setData(snowparkFeatures); deselectCurrentFeature(); }
            });
        });
    </script>
</body>
</html>
