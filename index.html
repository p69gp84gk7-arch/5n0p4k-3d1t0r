<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snowpark Designer Pro - CAO</title>
    
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/geotiff@2.1.3/dist-browser/geotiff.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* DESIGN GLOBAL ÉPURÉ (Type AutoCAD / Civil 3D) */
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Arial, sans-serif; background-color: #1e1e1e; color: #d4d4d4; overflow: hidden; }
        .app-container { display: flex; height: 100vh; width: 100vw; }
        
        /* Colonnes latérales */
        .sidebar { background-color: #252526; padding: 15px; box-sizing: border-box; overflow-y: auto; z-index: 10; border-right: 1px solid #333; }
        .sidebar-left { width: 300px; border-right: 1px solid #3e3e42; }
        .sidebar-right { width: 340px; border-left: 1px solid #3e3e42; border-right: none; }
        
        h2 { margin-top: 0; font-size: 1.1rem; color: #ffffff; border-bottom: 1px solid #3e3e42; padding-bottom: 10px; font-weight: normal; text-transform: uppercase; letter-spacing: 1px; }
        h3 { margin-top: 0; font-size: 0.9rem; color: #4daaf1; font-weight: normal; margin-bottom: 10px; }
        
        .panel { background-color: #2d2d30; padding: 15px; margin-bottom: 15px; border: 1px solid #3e3e42; }
        
        /* Boutons standards */
        .btn { width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #3e3e42; background-color: #3e3e42; color: #ffffff; cursor: pointer; font-size: 0.85rem; text-transform: uppercase; transition: background 0.2s; }
        .btn:hover { background-color: #4f4f53; }
        .btn-primary { background-color: #0e639c; border-color: #0e639c; }
        .btn-primary:hover { background-color: #1177bb; }
        .btn-danger { background-color: #c74c3c; border-color: #c74c3c; margin-top: 15px; }
        
        /* Boutons de Modules */
        .module-btn { background-color: #333337; border: 1px solid #555; padding: 8px; margin-bottom: 8px; text-align: center; cursor: pointer; font-size: 0.85rem; transition: background 0.2s; }
        .module-btn:hover { background-color: #444; }
        .module-btn.active { border-color: #4daaf1; background-color: #1e1e1e; color: #4daaf1; }
        
        /* Zone Centrale */
        .main-workspace { flex-grow: 1; position: relative; display: flex; flex-direction: column; background-color: #1e1e1e; }
        #map-container { flex-grow: 1; position: relative; } 
        #profile-container { height: 320px; background: #252526; border-top: 2px solid #007acc; padding: 10px; box-sizing: border-box; display: none; position: relative; }
        
        #close-profile { position: absolute; top: 10px; right: 10px; background: none; border: none; color: #d4d4d4; font-size: 1rem; cursor: pointer; font-family: monospace; }
        #close-profile:hover { color: #fff; }
        
        #altitude-box { position: absolute; top: 15px; left: 15px; background-color: rgba(30, 30, 30, 0.8); color: #4daaf1; padding: 8px 15px; font-size: 1rem; font-family: monospace; z-index: 20; border: 1px solid #3e3e42; }
        
        /* Liste des calques */
        .layer-item { background: #333337; padding: 8px; margin-bottom: 5px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border: 1px solid transparent; font-size: 0.85rem; }
        .layer-item.active { border-color: #007acc; background: #1e1e1e; }
        .layer-actions button { background: none; border: none; color: #aaa; cursor: pointer; font-size: 0.8rem; text-transform: uppercase; }
        .layer-actions button:hover { color: #fff; }
        
        /* Curseurs (Sliders) */
        input[type=range] { width: 100%; margin-top: 5px; margin-bottom: 12px; cursor: pointer; accent-color: #007acc; }
        label { font-size: 0.8rem; color: #d4d4d4; display: flex; justify-content: space-between; }
        .slider-val { font-weight: bold; color: #4daaf1; }
        hr { border: 0; height: 1px; background: #3e3e42; margin: 15px 0; }
        input[type=file] { font-size: 0.8rem; color: #d4d4d4; }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="sidebar sidebar-left">
            <h2>Snowpark Pro V21</h2>
            <div class="panel"><button class="btn btn-primary">Enregistrer Projet</button></div>
            
            <div class="panel">
                <h3>Topographie (MNT .tif)</h3>
                <input type="file" id="mnt-upload" accept=".tif,.tiff">
            </div>
            
            <div class="panel">
                <h3>Catalogue Modules</h3>
                <div class="module-btn" data-name="Kicker S (Débutant)">Kicker S (Débutant)</div>
                <div class="module-btn" data-name="Kicker M (Intermédiaire)">Kicker M (Intermédiaire)</div>
            </div>
        </div>

        <div class="main-workspace">
            <div id="altitude-box">Altitude: -- m</div>
            <div id="map-container"></div>
            <div id="profile-container">
                <button id="close-profile">FERMER [X]</button>
                <canvas id="profileChart"></canvas>
            </div>
        </div>

        <div class="sidebar sidebar-right">
            <h2>Gestionnaire</h2>
            
            <div id="layer-list-container">
                <p style="font-size: 0.8rem; color: #888;">Aucun module tracé.</p>
            </div>

            <div id="properties-panel" class="panel" style="display: none;">
                <h3 id="prop-title" style="color: #fff;">Propriétés</h3>
                
                <label>Rotation <span class="slider-val"><span id="angle-display">0</span>°</span></label>
                <input type="range" id="rotation-slider" min="0" max="360" value="0">
                
                <hr>
                
                <label>Longueur Table <span class="slider-val"><span id="table-display">4</span> m</span></label>
                <input type="range" id="table-slider" min="0" max="25" value="4" step="0.5">
                
                <label>Longueur Réception <span class="slider-val"><span id="landlen-display">8</span> m</span></label>
                <input type="range" id="landlen-slider" min="2" max="30" value="8" step="0.5">
                
                <hr>
                
                <label>Angle Appel (Kick) <span class="slider-val"><span id="kick-display">15</span>°</span></label>
                <input type="range" id="kick-slider" min="10" max="45" value="15" step="0.5">

                <label>Angle Réception <span class="slider-val"><span id="land-display">25</span>°</span></label>
                <input type="range" id="land-slider" min="5" max="45" value="25" step="0.5">
                
                <hr>
                
                <label>Vitesse Cible <span class="slider-val"><span id="speed-display">40</span> km/h</span></label>
                <input type="range" id="speed-slider" min="5" max="100" value="40">
                
                <label>Distance de Coupe <span class="slider-val"><span id="proj-display">40</span> m</span></label>
                <input type="range" id="proj-slider" min="10" max="150" value="40">
                
                <button class="btn btn-danger" id="delete-btn">Supprimer Module</button>
            </div>
        </div>
    </div>

    <script>
        // === 1. CONFIGURATION GLOBALE ===
        proj4.defs("EPSG:2154", "+proj=lcc +lat_1=49 +lat_2=44 +lat_0=46.5 +lon_0=3 +x_0=700000 +y_0=6600000 +ellps=GRS80 +towgs84=0,0,0,0,0,0,0 +units=m +no_defs");

        const moduleNorms = {
            'Kicker S (Débutant)': { width: 6, kickLen: 3, minKickAngle: 10, maxKickAngle: 25, defaultKickAngle: 15, defaultTable: 4, defaultLandLen: 8, color: '#4daaf1' },
            'Kicker M (Intermédiaire)': { width: 8, kickLen: 4, minKickAngle: 15, maxKickAngle: 35, defaultKickAngle: 25, defaultTable: 8, defaultLandLen: 12, color: '#f39c12' }
        };

        let map, chartInstance, currentChartParams = null;
        let activeModule = null, selectedFeatureId = null;
        let isDragging = false, draggedJustNow = false, startCursorLngLat = null, startBaseCoords = null;
        let mntData = null, mntBboxL93 = null, mntWidth = 0, mntHeight = 0;

        let snowparkFeatures = { type: 'FeatureCollection', features: [] };
        let decorationsFeatures = { type: 'FeatureCollection', features: [] };

        // Marqueurs visuels épurés
        const hoverEl = document.createElement('div');
        hoverEl.style.width = '10px'; hoverEl.style.height = '10px'; hoverEl.style.backgroundColor = '#e74c3c'; hoverEl.style.borderRadius = '50%';
        const hoverMarker = new maplibregl.Marker({element: hoverEl});

        const startEl = document.createElement('div');
        startEl.innerHTML = 'START'; startEl.style.color = '#fff'; startEl.style.backgroundColor = '#c74c3c'; startEl.style.padding = '2px 5px'; startEl.style.fontSize = '10px'; startEl.style.borderRadius = '3px';
        const startMarker = new maplibregl.Marker({element: startEl});

        // === 2. FONCTIONS GÉOMÉTRIQUES ===
        function getBaseCenter(baseCoords) {
            const pts = baseCoords[0]; return { lng: (pts[0][0] + pts[2][0])/2, lat: (pts[0][1] + pts[2][1])/2 };
        }

        function calculatePolygonCoords(lngLat, widthM, lengthM) {
            const R = 6378137; const lat = lngLat.lat; const lng = lngLat.lng;
            const dLat = (lengthM / 2) / R; const dLng = (widthM / 2) / (R * Math.cos(Math.PI * lat / 180));
            return [[
                [lng - dLng * 180 / Math.PI, lat - dLat * 180 / Math.PI], [lng + dLng * 180 / Math.PI, lat - dLat * 180 / Math.PI],
                [lng + dLng * 180 / Math.PI, lat + dLat * 180 / Math.PI], [lng - dLng * 180 / Math.PI, lat + dLat * 180 / Math.PI],
                [lng - dLng * 180 / Math.PI, lat - dLat * 180 / Math.PI]
            ]];
        }

        function getAltitudeAt(lng, lat) {
            if (!mntData || !mntBboxL93) return null;
            const pt = proj4("EPSG:4326", "EPSG:2154", [lng, lat]);
            if (pt[0] >= mntBboxL93[0] && pt[0] <= mntBboxL93[2] && pt[1] >= mntBboxL93[1] && pt[1] <= mntBboxL93[3]) {
                const xF = ((pt[0] - mntBboxL93[0]) / (mntBboxL93[2] - mntBboxL93[0])) * mntWidth;
                const yF = ((mntBboxL93[3] - pt[1]) / (mntBboxL93[3] - mntBboxL93[1])) * mntHeight;
                const x0 = Math.floor(xF); const x1 = Math.min(x0 + 1, mntWidth - 1);
                const y0 = Math.floor(yF); const y1 = Math.min(y0 + 1, mntHeight - 1);
                const tx = xF - x0; const ty = yF - y0;
                return (1-tx)*(1-ty)*mntData[y0*mntWidth+x0] + tx*(1-ty)*mntData[y0*mntWidth+x1] + (1-tx)*ty*mntData[y1*mntWidth+x0] + tx*ty*mntData[y1*mntWidth+x1];
            }
            return null;
        }

        // === 3. GESTION DES COUCHES ===
        function renderLayerList() {
            const container = document.getElementById('layer-list-container');
            container.innerHTML = '';
            if(snowparkFeatures.features.length === 0) {
                container.innerHTML = '<p style="font-size: 0.8rem; color: #888;">Aucun module tracé.</p>';
                return;
            }
            snowparkFeatures.features.forEach((feat, index) => {
                const isActive = (feat.properties.id === selectedFeatureId) ? 'active' : '';
                const visText = feat.properties.visible ? 'Masquer' : 'Afficher';
                container.insertAdjacentHTML('beforeend', `
                    <div class="layer-item ${isActive}" data-id="${feat.properties.id}">
                        <div style="flex-grow:1; font-weight:bold;">${index + 1}. ${feat.properties.name}</div>
                        <div class="layer-actions">
                            <button onclick="toggleVisibility(${feat.properties.id}, event)">[${visText}]</button>
                        </div>
                    </div>
                `);
            });
            document.querySelectorAll('.layer-item').forEach(el => {
                el.addEventListener('click', () => { selectFeature(parseInt(el.getAttribute('data-id'))); });
            });
        }

        window.toggleVisibility = function(id, event) {
            event.stopPropagation();
            const feat = snowparkFeatures.features.find(f => f.properties.id === id);
            feat.properties.visible = !feat.properties.visible;
            if(!feat.properties.visible && selectedFeatureId === id) deselectFeature();
            refreshMapData(); renderLayerList();
        };

        function refreshMapData() {
            const visibleFeatures = { type: 'FeatureCollection', features: snowparkFeatures.features.filter(f => f.properties.visible) };
            map.getSource('snowpark-data').setData(visibleFeatures);
            refreshDecorations();
        }

        // === 4. PHYSIQUE ET GRAPHIQUE ===
        function refreshDecorations() {
            decorationsFeatures.features = [];
            snowparkFeatures.features.filter(f => f.properties.visible).forEach(feat => {
                const coords = feat.geometry.coordinates[0];
                const ptHaut = turf.point([(coords[3][0]+coords[2][0])/2, (coords[3][1]+coords[2][1])/2]);
                const ptBas = turf.point([(coords[0][0]+coords[1][0])/2, (coords[0][1]+coords[1][1])/2]);
                const bearing = turf.bearing(ptHaut, ptBas);
                
                const amontPt = turf.destination(ptHaut, feat.properties.projectionDist, bearing - 180, {units: 'meters'});
                const avalPt = turf.destination(amontPt, feat.properties.projectionDist*2 + turf.distance(ptHaut, ptBas, {units: 'meters'}), bearing, {units: 'meters'});

                // Axe central
                decorationsFeatures.features.push({ type: 'Feature', properties: { type: 'axis' }, geometry: { type: 'LineString', coordinates: [amontPt.geometry.coordinates, avalPt.geometry.coordinates] }});
                
                // Démarcation des zones
                const kL = feat.properties.kickLen; const tL = feat.properties.tableLen;
                [[kL, 'zone'], [kL+tL, 'zone']].forEach(z => {
                    const lA = turf.destination(turf.point(coords[3]), z[0], bearing, {units: 'meters'}).geometry.coordinates;
                    const lB = turf.destination(turf.point(coords[2]), z[0], bearing, {units: 'meters'}).geometry.coordinates;
                    decorationsFeatures.features.push({ type: 'Feature', properties: { type: z[1] }, geometry: { type: 'LineString', coordinates: [lA, lB] }});
                });
            });
            map.getSource('decorations-data').setData(decorationsFeatures);
        }

        function updateProfileChart(feat) {
            const coords = feat.geometry.coordinates[0];
            const ptHaut = turf.point([(coords[3][0]+coords[2][0])/2, (coords[3][1]+coords[2][1])/2]);
            const ptBas = turf.point([(coords[0][0]+coords[1][0])/2, (coords[0][1]+coords[1][1])/2]);
            const bearing = turf.bearing(ptHaut, ptBas);
            const kickerLength = turf.distance(ptHaut, ptBas, {units: 'meters'});
            
            // Les 7 paramètres récupérés de la Feature
            const projDist = feat.properties.projectionDist;
            const kickAngle = feat.properties.kickAngle;
            const landAngle = feat.properties.landingAngle;
            const speedKmh = feat.properties.speed;
            const kickLen = feat.properties.kickLen;
            const tableLen = feat.properties.tableLen;

            const vMps = speedKmh / 3.6;
            const hNeeded = (vMps * vMps) / (2 * 9.81 * 0.9);
            let zStartKicker = getAltitudeAt(ptHaut.geometry.coordinates[0], ptHaut.geometry.coordinates[1]) || 0;
            
            // Calcul point START
            let foundStart = null;
            for(let d=1; d<200; d+=0.5) {
                const checkPt = turf.destination(ptHaut, d, bearing - 180, {units: 'meters'});
                const zCheck = getAltitudeAt(checkPt.geometry.coordinates[0], checkPt.geometry.coordinates[1]);
                if (zCheck && (zCheck - zStartKicker) >= hNeeded) { foundStart = checkPt; break; }
            }
            if(foundStart) startMarker.setLngLat(foundStart.geometry.coordinates).addTo(map); else startMarker.remove();

            const amontPt = turf.destination(ptHaut, projDist, bearing - 180, {units: 'meters'});
            const totalDistance = projDist * 2 + kickerLength;
            const steps = 120; // Optimisé pour fluidité du drag & drop
            currentChartParams = { amontPt, bearing, totalDistance, steps };

            const labels = [], terrainData = [], kickerData = [], trajData = [];
            const zKickEnd = zStartKicker + (kickLen * Math.tan(kickAngle * Math.PI / 180));
            const lipDist = projDist + kickLen;
            
            const v0 = vMps; const theta = kickAngle * Math.PI / 180; const g = 9.81;
            const apexStr = ((v0 * Math.sin(theta))**2 / (2 * g)).toFixed(2);
            let hasLanded = false;

            for(let i=0; i<=steps; i++) {
                const fraction = i/steps; const curD = fraction * totalDistance;
                const ptX = turf.destination(amontPt, curD, bearing, {units: 'meters'});
                labels.push(curD.toFixed(1) + 'm');
                
                const zTerrain = getAltitudeAt(ptX.geometry.coordinates[0], ptX.geometry.coordinates[1]) || 0;
                terrainData.push(zTerrain);

                let zK = null;
                if (curD >= projDist && curD <= projDist + kickerLength) {
                    const d = curD - projDist;
                    if (d <= kickLen) zK = zStartKicker + (d * Math.tan(kickAngle * Math.PI / 180));
                    else if (d <= kickLen + tableLen) zK = zKickEnd;
                    else zK = zKickEnd - ((d - kickLen - tableLen) * Math.tan(landAngle * Math.PI / 180));
                }
                kickerData.push(zK);

                if (curD >= lipDist && !hasLanded) {
                    const t = (curD - lipDist) / (v0 * Math.cos(theta));
                    const zTraj = zKickEnd + (v0 * Math.sin(theta) * t) - (0.5 * g * t * t);
                    if (zTraj >= (zK || zTerrain)) trajData.push(zTraj);
                    else { trajData.push(zK || zTerrain); hasLanded = true; }
                } else trajData.push(null);
            }

            document.getElementById('profile-container').style.display = 'block'; map.resize();
            const ctx = document.getElementById('profileChart').getContext('2d');

            Chart.defaults.color = '#888';
            Chart.defaults.font.family = 'Segoe UI';

            if (chartInstance) {
                chartInstance.options.plugins.title.text = `APEX Vol: ${apexStr}m au-dessus de l'appel`;
                chartInstance.data.labels = labels; 
                chartInstance.data.datasets[0].data = terrainData;
                chartInstance.data.datasets[1].data = kickerData; 
                chartInstance.data.datasets[2].data = trajData;
                chartInstance.update();
            } else {
                chartInstance = new Chart(ctx, {
                    type: 'line',
                    data: { labels: labels, datasets: [
                        { label: 'Terrain (MNT)', data: terrainData, borderColor: '#7f8c8d', backgroundColor: 'rgba(127, 140, 141, 0.2)', fill: true, pointRadius: 0, tension: 0.1 },
                        { label: 'Ouvrage (Neige)', data: kickerData, borderColor: '#4daaf1', borderWidth: 3, pointRadius: 0, tension: 0 },
                        { label: 'Trajectoire', data: trajData, borderColor: '#c74c3c', borderDash: [5,5], borderWidth: 2, pointRadius: 0, tension: 0.3 }
                    ]},
                    options: { 
                        responsive: true, maintainAspectRatio: false, animation: false,
                        plugins: { 
                            title: { display: true, text: `APEX Vol: ${apexStr}m`, color: '#fff', font: {size: 14} },
                            legend: { labels: { color: '#d4d4d4' } },
                            tooltip: { mode: 'index', intersect: false } 
                        },
                        scales: { 
                            y: { grid: { color: '#333' } },
                            x: { grid: { color: '#333' }, ticks: { maxTicksLimit: 10 } }
                        },
                        onHover: (e, active) => {
                            if(active.length > 0 && currentChartParams) {
                                const pt = turf.destination(currentChartParams.amontPt, (active[0].index/currentChartParams.steps)*currentChartParams.totalDistance, currentChartParams.bearing, {units: 'meters'});
                                hoverMarker.setLngLat(pt.geometry.coordinates).addTo(map);
                            }
                        }
                    }
                });
            }
        }

        // === 5. INITIALISATION DE LA CARTE ===
        document.addEventListener('DOMContentLoaded', () => {
            map = new maplibregl.Map({ 
                container: 'map-container', 
                style: { 'version': 8, 'sources': { 's': { 'type': 'raster', 'tiles': ['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'], 'tileSize': 256 } }, 'layers': [{ 'id': 's', 'type': 'raster', 'source': 's' }] }, 
                center: [0.5936, 42.7610], zoom: 14 
            });
            map.addControl(new maplibregl.NavigationControl(), 'top-right');

            map.on('load', () => {
                map.addSource('snowpark-data', { type: 'geojson', data: snowparkFeatures });
                map.addLayer({ id: 'modules-fill', type: 'fill', source: 'snowpark-data', paint: { 'fill-color': ['get', 'color'], 'fill-opacity': 0.5 } });
                map.addLayer({ id: 'modules-outline', type: 'line', source: 'snowpark-data', paint: { 'line-color': ['case', ['boolean', ['feature-state', 'selected'], false], '#007acc', '#fff'], 'line-width': ['case', ['boolean', ['feature-state', 'selected'], false], 3, 1] } });
                
                map.addSource('decorations-data', { type: 'geojson', data: decorationsFeatures });
                map.addLayer({ id: 'axis-layer', type: 'line', source: 'decorations-data', filter: ['==', 'type', 'axis'], paint: { 'line-color': '#c74c3c', 'line-width': 1, 'line-dasharray': [4, 4] } });
                map.addLayer({ id: 'zone-layer', type: 'line', source: 'decorations-data', filter: ['==', 'type', 'zone'], paint: { 'line-color': '#fff', 'line-width': 1, 'line-dasharray': [2, 2] } });
            });

            // Chargement MNT
            document.getElementById('mnt-upload').addEventListener('change', async (e) => {
                document.getElementById('altitude-box').innerText = "Lecture TIFF...";
                const tiff = await GeoTIFF.fromBlob(e.target.files[0]); const img = await tiff.getImage();
                mntBboxL93 = img.getBoundingBox(); mntWidth = img.getWidth(); mntHeight = img.getHeight();
                mntData = (await img.readRasters())[0];
                const bl = proj4("EPSG:2154", "EPSG:4326", [mntBboxL93[0], mntBboxL93[1]]);
                const tr = proj4("EPSG:2154", "EPSG:4326", [mntBboxL93[2], mntBboxL93[3]]);
                map.fitBounds([bl, tr], { padding: 40 });
                document.getElementById('altitude-box').innerText = "MNT Actif";
            });

            map.on('mousemove', (e) => {
                const alt = getAltitudeAt(e.lngLat.lng, e.lngLat.lat);
                document.getElementById('altitude-box').innerText = alt ? `Alt: ${alt.toFixed(2)}m` : "Hors zone MNT";
            });

            // GESTION CRÉATION MODULES
            const mods = document.querySelectorAll('.module-btn');
            mods.forEach(m => m.addEventListener('click', (e) => {
                activeModule = (activeModule === e.target.getAttribute('data-name')) ? null : e.target.getAttribute('data-name');
                mods.forEach(b => b.classList.toggle('active', activeModule === b.getAttribute('data-name')));
                map.getCanvas().style.cursor = activeModule ? 'crosshair' : '';
            }));

            map.on('click', (e) => {
                if (draggedJustNow) return;
                if (activeModule) {
                    const n = moduleNorms[activeModule]; const id = Date.now();
                    const c = calculatePolygonCoords(e.lngLat, n.width, n.kickLen + n.defaultTable + n.defaultLandLen);
                    
                    const nf = { 
                        id, type: 'Feature', 
                        properties: { 
                            id, name: activeModule, visible: true, color: n.color, 
                            rotation: 0, projectionDist: 40, speed: 40, 
                            kickLen: n.kickLen, tableLen: n.defaultTable, landLen: n.defaultLandLen, 
                            kickAngle: n.defaultKickAngle, landingAngle: 25, 
                            baseCoords: JSON.stringify(c) 
                        }, 
                        geometry: { type: 'Polygon', coordinates: c } 
                    };
                    
                    snowparkFeatures.features.push(nf); refreshMapData(); selectFeature(id);
                    activeModule = null; mods.forEach(b => b.classList.remove('active')); map.getCanvas().style.cursor = '';
                } else if (!map.queryRenderedFeatures(e.point, { layers: ['modules-fill'] }).length) {
                    deselectFeature();
                }
            });

            // GESTION DRAG & DROP ROBUSTE
            map.on('mousedown', 'modules-fill', (e) => {
                if (activeModule) return; 
                e.preventDefault(); isDragging = true; map.dragPan.disable(); 
                startCursorLngLat = e.lngLat;
                const id = e.features[0].properties.id;
                selectFeature(id);
                startBaseCoords = JSON.parse(snowparkFeatures.features.find(f => f.properties.id === id).properties.baseCoords);
            });

            map.on('mousemove', (e) => {
                if (!isDragging || !selectedFeatureId) return;
                const feat = snowparkFeatures.features.find(f => f.properties.id === selectedFeatureId);
                const lngOffset = e.lngLat.lng - startCursorLngLat.lng; 
                const latOffset = e.lngLat.lat - startCursorLngLat.lat;
                
                const newBaseCoords = startBaseCoords[0].map(c => [c[0] + lngOffset, c[1] + latOffset]);
                feat.properties.baseCoords = JSON.stringify([newBaseCoords]);
                feat.geometry.coordinates = turf.transformRotate(turf.polygon([newBaseCoords]), feat.properties.rotation).geometry.coordinates;
                
                refreshMapData(); updateProfileChart(feat); // MISE À JOUR TEMPS RÉEL SUR DRAG !
            });

            map.on('mouseup', () => { 
                if(isDragging) { isDragging=false; draggedJustNow=true; setTimeout(()=>draggedJustNow=false,100); map.dragPan.enable(); }
            });

            // FERMETURE ET SUPPRESSION
            document.getElementById('close-profile').addEventListener('click', deselectFeature);
            document.getElementById('delete-btn').addEventListener('click', () => {
                snowparkFeatures.features = snowparkFeatures.features.filter(x => x.properties.id !== selectedFeatureId);
                deselectFeature();
            });

            // CONNEXION DES CURSEURS (PROPRIÉTÉS)
            function syncSlider(propName, sliderId, displayId, isLength) {
                document.getElementById(sliderId).addEventListener('input', (e) => {
                    if(!selectedFeatureId) return;
                    const val = parseFloat(e.target.value); document.getElementById(displayId).innerText = val;
                    const f = snowparkFeatures.features.find(x => x.properties.id === selectedFeatureId);
                    
                    f.properties[propName] = val;
                    if (isLength) { 
                        const norm = moduleNorms[f.properties.name];
                        const newTotalLen = f.properties.kickLen + f.properties.tableLen + f.properties.landLen;
                        const center = getBaseCenter(JSON.parse(f.properties.baseCoords));
                        const newCoords = calculatePolygonCoords(center, norm.width, newTotalLen);
                        f.properties.baseCoords = JSON.stringify(newCoords);
                        f.geometry.coordinates = turf.transformRotate(turf.polygon(newCoords), f.properties.rotation).geometry.coordinates;
                        refreshMapData(); updateProfileChart(f);
                    } else if (propName === 'rotation') {
                        f.geometry.coordinates = turf.transformRotate(turf.polygon(JSON.parse(f.properties.baseCoords)), val).geometry.coordinates;
                        refreshMapData(); updateProfileChart(f);
                    } else {
                        refreshMapData(); updateProfileChart(f); // Juste la physique/coupe
                    }
                });
            }
            
            // Initialisation des 7 curseurs
            syncSlider('rotation', 'rotation-slider', 'angle-display', false);
            syncSlider('tableLen', 'table-slider', 'table-display', true);
            syncSlider('landLen', 'landlen-slider', 'landlen-display', true);
            syncSlider('kickAngle', 'kick-slider', 'kick-display', false);
            syncSlider('landingAngle', 'land-slider', 'land-display', false);
            syncSlider('speed', 'speed-slider', 'speed-display', false);
            syncSlider('projectionDist', 'proj-slider', 'proj-display', false);
        });

        function selectFeature(id) {
            if(selectedFeatureId) map.setFeatureState({ source: 'snowpark-data', id: selectedFeatureId }, { selected: false });
            selectedFeatureId = id; map.setFeatureState({ source: 'snowpark-data', id: selectedFeatureId }, { selected: true });
            
            const f = snowparkFeatures.features.find(x => x.properties.id === id);
            if(!f.properties.visible) return;

            document.getElementById('properties-panel').style.display = 'block';
            document.getElementById('prop-title').innerText = f.properties.name;
            
            document.getElementById('kick-slider').min = moduleNorms[f.properties.name].minKickAngle;
            document.getElementById('kick-slider').max = moduleNorms[f.properties.name].maxKickAngle;

            ['rotation', 'speed', 'table', 'landlen', 'kick', 'land', 'proj'].forEach(p => {
                let sid = (p==='table'?'table-slider':p==='landlen'?'landlen-slider':p==='land'?'land-slider':p==='proj'?'proj-slider':p+'-slider');
                let val = (p==='table'?f.properties.tableLen:p==='landlen'?f.properties.landLen:p==='proj'?f.properties.projectionDist:p==='land'?f.properties.landingAngle:f.properties[p+(p==='kick'?'Angle':'')]);
                document.getElementById(sid).value = val; document.getElementById(p+'-display').innerText = val;
            });
            renderLayerList(); updateProfileChart(f);
        }

        function deselectFeature() {
            if(selectedFeatureId) map.setFeatureState({ source: 'snowpark-data', id: selectedFeatureId }, { selected: false });
            selectedFeatureId = null; 
            document.getElementById('properties-panel').style.display = 'none';
            document.getElementById('profile-container').style.display = 'none'; 
            startMarker.remove(); hoverMarker.remove();
            renderLayerList(); refreshMapData(); map.resize();
        }
    </script>
</body>
</html>
