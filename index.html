<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snowpark Designer Pro</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <div id="ui-panel">
      <h2>Snowpark Designer</h2>
      
      <div class="control-group">
        <label for="mnt-upload">1. Charger MNT (.csv, .txt) :</label>
        <input type="file" id="mnt-upload" accept=".csv, .txt, .xyz" />
      </div>

      <div class="control-group">
        <label for="snow-slider">2. Neige de culture (<span id="snow-val">0</span>m) :</label>
        <input type="range" id="snow-slider" min="0" max="5" step="0.1" value="0">
      </div>

      <div class="control-group">
        <button id="save-btn">💾 Sauvegarder sur Cloud</button>
      </div>
    </div>

    <div id="profile-panel">
      <canvas id="profileChart"></canvas>
    </div>

    <script type="module" src="/main.js"></script>
  </body>
</html>
