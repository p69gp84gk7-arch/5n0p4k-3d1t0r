<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snowpark Designer Pro</title>
    
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; }
        .app-container { display: flex; height: 100vh; width: 100vw; }
        
        .sidebar { width: 320px; background-color: #2c3e50; color: #ecf0f1; padding: 20px; box-sizing: border-box; overflow-y: auto; z-index: 10; box-shadow: 2px 0 5px rgba(0,0,0,0.2); }
        .sidebar h2 { margin-top: 0; font-size: 1.5rem; border-bottom: 1px solid #34495e; padding-bottom: 15px; }
        .panel { background-color: #34495e; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .panel h3 { margin-top: 0; font-size: 1.1rem; color: #3498db; }
        
        .btn { width: 100%; padding: 10px; margin-bottom: 10px; border: none; border-radius: 5px; background-color: #7f8c8d; color: white; cursor: pointer; font-weight: bold; }
        .btn-primary { background-color: #27ae60; }
        
        .module-btn { background-color: #e67e22; padding: 10px; margin-bottom: 8px; text-align: center; border-radius: 4px; cursor: pointer; font-weight: bold; transition: all 0.2s; }
        
        .main-workspace { flex-grow: 1; position: relative; }
        #map-container { position: absolute; top: 0; bottom: 0; width: 100%; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="sidebar">
            <h2>🛠️ Snowpark Pro v5</h2>
            
            <div class="panel">
                <h3>📂 Gestion de Projet</h3>
                <button class="btn">Charger un projet</button>
                <button class="btn btn-primary">Enregistrer sur Sheets</button>
            </div>

            <div class="panel">
                <h3>⛷️ Modules (Norme)</h3>
                <p style="font-size: 0.8rem; color: #bdc3c7;">1. Cliquez sur un module.<br>2. Cliquez sur la carte pour le poser.</p>
                <div class="module-btn">Kicker S (Débutant)</div>
                <div class="module-btn">Kicker M (Intermédiaire)</div>
                <div class="module-btn">Rail Plat (6m)</div>
            </div>
        </div>

        <div class="main-workspace">
            <div id="map-container"></div>
        </div>
    </div>

    <script>
        // ON DÉCLARE LA CARTE ICI (GLOBALE) POUR NE PLUS LA PERDRE
        let map;
        let activeModule = null;

        document.addEventListener('DOMContentLoaded', () => {
            
            // 1. Initialisation de la carte
            map = new maplibregl.Map({
                container: 'map-container',
                style: {
                    'version': 8,
                    'sources': {
                        'osm': {
                            'type': 'raster',
                            'tiles': ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
                            'tileSize': 256
                        }
                    },
                    'layers': [{
                        'id': 'osm-layer',
                        'type': 'raster',
                        'source': 'osm'
                    }]
                },
                center: [0.5936, 42.7610],
                zoom: 12
            });

            map.addControl(new maplibregl.NavigationControl(), 'top-right');

            // 2. Logique de Placement de Modules (Méthode CAO)
            const modules = document.querySelectorAll('.module-btn');
            
            modules.forEach(mod => {
                mod.addEventListener('click', (e) => {
                    modules.forEach(m => m.style.border = 'none');
                    
                    if (activeModule === e.target.innerText) {
                        activeModule = null;
                        if(map) map.getCanvas().style.cursor = ''; 
                    } else {
                        activeModule = e.target.innerText;
                        e.target.style.border = '3px solid #2ecc71'; 
                        if(map) map.getCanvas().style.cursor = 'crosshair'; 
                    }
                });
            });

            // 3. Gestion du clic sur la carte
            map.on('click', (e) => {
                if (activeModule) {
                    const lngLat = e.lngLat;

                    // Design de l'étiquette
                    const el = document.createElement('div');
                    el.style.backgroundColor = '#e67e22';
                    el.style.color = 'white';
                    el.style.padding = '5px 10px';
                    el.style.borderRadius = '5px';
                    el.style.fontWeight = 'bold';
                    el.style.border = '2px solid white';
                    el.style.boxShadow = '0 2px 4px rgba(0,0,0,0.3)';
                    el.style.cursor = 'move';
                    el.innerHTML = '🏂 ' + activeModule;

                    // Ajout du repère
                    new maplibregl.Marker({element: el, draggable: true})
                        .setLngLat(lngLat)
                        .addTo(map);
                        
                    // Réinitialisation
                    activeModule = null;
                    modules.forEach(m => m.style.border = 'none');
                    map.getCanvas().style.cursor = '';
                }
            });

        });
    </script>
</body>
</html>
