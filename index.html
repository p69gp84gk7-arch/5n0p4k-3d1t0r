<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snowpark Designer Pro</title>
    <link rel="stylesheet" href="style.css">
    
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
</head>
<body>

    <div class="sidebar">
        <h2>🛠️ Snowpark Pro</h2>
        
        <div class="panel">
            <h3>📂 Gestion de Projet</h3>
            <button class="btn">Charger un projet</button>
            <button class="btn btn-primary">Enregistrer sur Sheets</button>
        </div>

        <div class="panel">
            <h3>🗺️ Topographie & Calques</h3>
            <label>Importer un MNT (.tif)</label>
            <input type="file" id="mnt-upload" accept=".tif">
            
            <label>Importer des repères (.kmz)</label>
            <input type="file" id="kmz-upload" accept=".kmz">
            
            <ul id="layer-list">
                <li>Couche MNT <button>👁️</button> <button>❌</button></li>
            </ul>
        </div>

        <div class="panel">
            <h3>⛷️ Modules (Norme)</h3>
            <p class="info-text">Glissez un module sur la carte.</p>
            <div class="module-btn" draggable="true">Kicker S (Débutant)</div>
            <div class="module-btn" draggable="true">Kicker M (Intermédiaire)</div>
            <div class="module-btn" draggable="true">Rail Plat (6m)</div>
        </div>
    </div>

    <div class="main-workspace">
        <div id="map-container"></div>
        
        <div id="profile-container" style="display: none;">
            <p>Graphique de coupe, neige et trajectoire</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
